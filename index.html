<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ふりかけパラパラ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:linear-gradient(170deg,#2D1B0E,#3E2415 40%,#4A2C1A);color:#fff}
#app{width:100%;height:100%;position:relative;overflow:hidden}
button{font-family:'Zen Maru Gothic',sans-serif;cursor:pointer;border:none;outline:none;-webkit-appearance:none}
.bm{background:linear-gradient(135deg,#FF8F00,#E65100);color:#fff;border-radius:50px;padding:14px 44px;font-size:18px;font-weight:900;box-shadow:0 6px 24px rgba(230,81,0,.5),inset 0 1px 0 rgba(255,255,255,.3)}
.bs{background:transparent;border:2px solid rgba(255,255,255,.15);border-radius:50px;padding:10px 32px;font-size:13px;font-weight:700;color:#BCAAA4}
@keyframes shimaIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes shimaHappy{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-12px) scale(1.08)}60%{transform:translateY(2px) scale(.97)}100%{transform:translateY(0) scale(1)}}
@keyframes shimaPanic{0%,100%{transform:translateX(0) rotate(0)}25%{transform:translateX(-4px) rotate(-3deg)}75%{transform:translateX(4px) rotate(3deg)}}
@keyframes conveyorMove{0%{background-position:0 0}100%{background-position:40px 0}}
@keyframes dangerPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}
@keyframes screenShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}15%{transform:scale(1.15)}30%{transform:scale(1)}45%{transform:scale(1.1)}}
@keyframes titleFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-10px) rotate(1deg)}}
@keyframes starSpin{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(1.2)}100%{transform:rotate(360deg) scale(1)}}
@keyframes shimaDance{0%{transform:translateY(0) rotate(0)}10%{transform:translateY(-20px) rotate(-8deg) scale(1.1)}20%{transform:translateY(0) rotate(8deg)}30%{transform:translateY(-15px) rotate(-5deg)}50%{transform:translateY(-25px) rotate(-10deg) scale(1.15)}60%{transform:translateY(0) rotate(10deg)}80%{transform:translateY(0) rotate(3deg)}100%{transform:translateY(0) rotate(0)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:.3}}
@keyframes omedetouPop{0%{transform:scale(0) rotate(-10deg);opacity:0}50%{transform:scale(1.2) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 20px rgba(255,213,79,.3)}50%{text-shadow:0 0 30px rgba(255,213,79,.6),0 0 60px rgba(255,152,0,.4)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const F=[{id:"noritama",name:"のりたま",color:"#E8C840",accent:"#4A7C3F",emoji:"🥚"},{id:"sake",name:"さけ",color:"#E8736B",accent:"#C94F47",emoji:"🐟"},{id:"ume",name:"梅しそ",color:"#D4508B",accent:"#A23B6A",emoji:"🌸"},{id:"wasabi",name:"わさび",color:"#6DAD3C",accent:"#4A8520",emoji:"🟢"},{id:"mentai",name:"明太子",color:"#E53935",accent:"#B71C1C",emoji:"🌶️"},{id:"katsuo",name:"かつお",color:"#8D6E63",accent:"#5D4037",emoji:"🐱"},{id:"tamago",name:"たまご",color:"#FFD54F",accent:"#FF8F00",emoji:"🍳"},{id:"kombu",name:"こんぶ",color:"#2E7D32",accent:"#1B5E20",emoji:"🌿"}];
const LT=20,ML=20,MM=3;
const LV=[[1,30,1,3],[1,15,1,3],[1,10,1,3],[1,5,1,4],[1,20,2,3],[1,10,2,4],[1,15,3,4],[1,10,3,4],[2,15,1,4],[2,10,1,5],[2,5,1,5],[2,20,2,5],[2,10,2,5],[3,15,1,5],[3,7,1,5],[3,15,2,5],[3,15,3,6],[3,10,2,6],[3,15,3,6],[3,10,3,6]];
const cfg=l=>{const[c,s,t,r]=LV[Math.min(l-1,19)];return{conv:c,spd:s,top:t,req:r}};
const rndF=n=>[...F].sort(()=>Math.random()-.5).slice(0,n);

let _ac=null,_acu=false;
function ac(){if(!_ac){const C=window.AudioContext||window.webkitAudioContext;_ac=new C()}if(_ac.state==="suspended")_ac.resume().catch(()=>{});if(!_acu){try{const b=_ac.createBuffer(1,1,_ac.sampleRate),s=_ac.createBufferSource();s.buffer=b;s.connect(_ac.destination);s.start(0)}catch(e){}_acu=true}return _ac}
function sndShu(){try{const c=ac(),dur=.12,n=(c.sampleRate*dur)|0,buf=c.createBuffer(1,n,c.sampleRate),d=buf.getChannelData(0);for(let i=0;i<n;i++){const t=i/n;d[i]=(Math.random()*2-1)*(1-t)*(1-t)*.3}const src=c.createBufferSource();src.buffer=buf;const hp=c.createBiquadFilter();hp.type="highpass";hp.frequency.value=3000;const bp=c.createBiquadFilter();bp.type="bandpass";bp.frequency.value=5000;bp.Q.value=1.5;const g=c.createGain();g.gain.setValueAtTime(.4,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);src.connect(hp).connect(bp).connect(g).connect(c.destination);src.start();src.stop(c.currentTime+dur)}catch(e){}}
function sndSa(){try{const c=ac(),dur=.22,n=(c.sampleRate*dur)|0,buf=c.createBuffer(1,n,c.sampleRate),d=buf.getChannelData(0);for(let i=0;i<n;i++){const t=i/n;d[i]=(Math.random()*2-1)*Math.sin(t*Math.PI)*(1-t*.3)*.6}const src=c.createBufferSource();src.buffer=buf;const bp=c.createBiquadFilter();bp.type="bandpass";bp.frequency.value=3500;bp.Q.value=.6;const g=c.createGain();g.gain.setValueAtTime(.9,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);src.connect(bp).connect(g).connect(c.destination);src.start();src.stop(c.currentTime+dur)}catch(e){}}
function sndMiss(){try{const c=ac(),o=c.createOscillator();o.type="square";o.frequency.setValueAtTime(200,c.currentTime);o.frequency.linearRampToValueAtTime(120,c.currentTime+.15);const g=c.createGain();g.gain.setValueAtTime(.15,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.15);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+.15)}catch(e){}}
function sndClear(){try{const c=ac(),t=c.currentTime;[[523,0,.4],[659,.15,.4],[784,.3,.4],[1047,.5,.9]].forEach(([f,dt,dur])=>{const o=c.createOscillator();o.type="triangle";o.frequency.value=f;const g=c.createGain();g.gain.setValueAtTime(0,t+dt);g.gain.linearRampToValueAtTime(.25,t+dt+.03);g.gain.exponentialRampToValueAtTime(.001,t+dt+dur);o.connect(g).connect(c.destination);o.start(t+dt);o.stop(t+dt+dur+.01);const o2=c.createOscillator();o2.type="sine";o2.frequency.value=f*2;const g2=c.createGain();g2.gain.setValueAtTime(0,t+dt+.02);g2.gain.linearRampToValueAtTime(.1,t+dt+.05);g2.gain.exponentialRampToValueAtTime(.001,t+dt+dur*.7);o2.connect(g2).connect(c.destination);o2.start(t+dt+.02);o2.stop(t+dt+dur+.01)})}catch(e){}}
function sndFail(){try{const c=ac(),t=c.currentTime;[[330,0],[294,.3],[262,.6]].forEach(([f,dt])=>{const o=c.createOscillator();o.type="triangle";o.frequency.value=f;const lfo=c.createOscillator();lfo.frequency.value=5;const lg=c.createGain();lg.gain.value=3;lfo.connect(lg).connect(o.frequency);const g=c.createGain();g.gain.setValueAtTime(0,t+dt);g.gain.linearRampToValueAtTime(.2,t+dt+.03);g.gain.exponentialRampToValueAtTime(.001,t+dt+.35);o.connect(g).connect(c.destination);o.start(t+dt);o.stop(t+dt+.36);lfo.start(t+dt);lfo.stop(t+dt+.36)})}catch(e){}}
function sndCelebrate(){try{const c=ac(),t=c.currentTime,m=c.createGain();m.gain.value=.15;m.connect(c.destination);[[523,0,.25],[659,.2,.25],[784,.4,.3],[1047,.7,.5],[1175,1,.3],[1319,1.2,.3],[1568,1.5,.8],[2093,2,1.2]].forEach(([f,dt,dur])=>{const o=c.createOscillator();o.type="triangle";o.frequency.value=f;const g=c.createGain();g.gain.setValueAtTime(0,t+dt);g.gain.linearRampToValueAtTime(.4,t+dt+.04);g.gain.exponentialRampToValueAtTime(.001,t+dt+dur);o.connect(g).connect(m);o.start(t+dt);o.stop(t+dt+dur+.02)});[131,165,196,262].forEach((f,i)=>{const o=c.createOscillator();o.type="sine";o.frequency.value=f;const g=c.createGain();g.gain.setValueAtTime(.3,t+i*.6);g.gain.exponentialRampToValueAtTime(.001,t+i*.6+.5);o.connect(g).connect(m);o.start(t+i*.6);o.stop(t+i*.6+.55)})}catch(e){}}
let _bgm=null;
function bgmStart(){try{bgmStop();const c=ac(),mg=c.createGain();mg.gain.value=.08;mg.connect(c.destination);const bpm=140,bl=60/bpm,ll=bl*16;const mel=[523,587,659,784,880,784,659,587,523,659,784,880,784,659,523,587,880,784,659,523,587,659,784,659,523,587,659,784,880,1047,880,784];const bas=[131,131,165,165,196,196,165,165,131,131,196,196,220,220,196,196];const now=c.currentTime+.05;const sched=(st)=>{mel.forEach((f,i)=>{const o=c.createOscillator();o.type="triangle";o.frequency.value=f;const g=c.createGain();const t0=st+i*(ll/mel.length),d=ll/mel.length*.7;g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(.3,t0+.02);g.gain.exponentialRampToValueAtTime(.001,t0+d);o.connect(g).connect(mg);o.start(t0);o.stop(t0+d+.01)});bas.forEach((f,i)=>{const o=c.createOscillator();o.type="sine";o.frequency.value=f;const g=c.createGain();const t0=st+i*(ll/bas.length),d=ll/bas.length*.5;g.gain.setValueAtTime(.4,t0);g.gain.exponentialRampToValueAtTime(.001,t0+d);o.connect(g).connect(mg);o.start(t0);o.stop(t0+d+.01)});for(let i=0;i<32;i++){const n=(c.sampleRate*.03)|0,b=c.createBuffer(1,n,c.sampleRate),a=b.getChannelData(0);for(let j=0;j<n;j++)a[j]=(Math.random()*2-1)*(1-j/n);const s=c.createBufferSource();s.buffer=b;const h=c.createBiquadFilter();h.type="highpass";h.frequency.value=8000;const g=c.createGain();g.gain.value=i%2===0?.15:.08;const t0=st+i*(ll/32);s.connect(h).connect(g).connect(mg);s.start(t0);s.stop(t0+.03)}};for(let l=0;l<4;l++)sched(now+l*ll);_bgm={mg,c,st:now,ll,sched,nl:4,tid:null};const ahead=()=>{if(!_bgm)return;const nd=Math.ceil((c.currentTime-_bgm.st+ll*2)/ll);while(_bgm.nl<nd){sched(_bgm.st+_bgm.nl*ll);_bgm.nl++}_bgm.tid=setTimeout(ahead,ll*500)};_bgm.tid=setTimeout(ahead,ll*2000)}catch(e){}}
function bgmStop(){if(!_bgm)return;try{clearTimeout(_bgm.tid);_bgm.mg.gain.exponentialRampToValueAtTime(.001,_bgm.c.currentTime+.3);setTimeout(()=>{try{_bgm.mg.disconnect()}catch(e){}},500)}catch(e){}_bgm=null}

const shimaSVG=(expr,size)=>{const eyes=expr==='happy'?'<path d="M 46 35 Q 49 31 52 35" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M 68 35 Q 71 31 74 35" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>':expr==='panic'?'<circle cx="49" cy="33" r="4" fill="#1A1A1A"/><circle cx="71" cy="33" r="4" fill="#1A1A1A"/><circle cx="50.5" cy="31.5" r="1.5" fill="white"/><circle cx="72.5" cy="31.5" r="1.5" fill="white"/><ellipse cx="60" cy="48" rx="4" ry="3" fill="#1A1A1A"/>':expr==='sad'?'<path d="M 46 36 Q 49 34 52 36" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M 68 36 Q 71 34 74 36" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>':'<circle cx="49" cy="35" r="3" fill="#1A1A1A"/><circle cx="71" cy="35" r="3" fill="#1A1A1A"/><circle cx="50" cy="34" r="1" fill="white"/><circle cx="72" cy="34" r="1" fill="white"/>';const anim=expr==='panic'?'shimaPanic .3s ease infinite':expr==='happy'?'shimaHappy .5s ease':'shimaIdle 2.5s ease-in-out infinite';const panic=expr==='panic'?'<line x1="38" y1="18" x2="34" y2="12" stroke="#E53935" stroke-width="2" stroke-linecap="round"/><line x1="82" y1="18" x2="86" y2="12" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>':'';return`<svg width="${size}" height="${size}" viewBox="0 0 120 120" style="filter:drop-shadow(0 3px 6px rgba(0,0,0,.12));animation:${anim}"><ellipse cx="60" cy="70" rx="36" ry="34" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/><circle cx="60" cy="38" r="27" fill="#FEFEFE" stroke="#E8E8E8" stroke-width="1"/><ellipse cx="60" cy="18" rx="15" ry="9" fill="#FEFEFE" stroke="#E8E8E8" stroke-width=".5"/><ellipse cx="50" cy="20" rx="7" ry="5" fill="white"/><ellipse cx="70" cy="20" rx="7" ry="5" fill="white"/><path d="M 38 35 Q 48 38 52 36" stroke="#1A1A1A" stroke-width="3.5" fill="none" stroke-linecap="round"/><path d="M 68 36 Q 72 38 82 35" stroke="#1A1A1A" stroke-width="3.5" fill="none" stroke-linecap="round"/>${eyes}<ellipse cx="60" cy="42" rx="3" ry="2" fill="#FFB74D"/><ellipse cx="42" cy="40" rx="5" ry="3" fill="#FFCDD2" opacity=".5"/><ellipse cx="78" cy="40" rx="5" ry="3" fill="#FFCDD2" opacity=".5"/>${panic}<path d="M 88 77 Q 108 62 113 47" stroke="#E0E0E0" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M 48 100 L 45 110 M 48 100 L 48 110 M 48 100 L 51 110" stroke="#FFB74D" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M 72 100 L 69 110 M 72 100 L 72 110 M 72 100 L 75 110" stroke="#FFB74D" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`};

const app=document.getElementById('app');
let G={scr:'title',lv:1,clr:new Set(),time:LT,score:0,miss:0,sel:[],bowls:[],msg:'',expr:'normal',active:false,nid:0,lt:null,sp:[0,0,0]};
let fid=null,tiv=null;

function show(name){G.scr=name;app.innerHTML='';({title:rTitle,levelSelect:rLevelSel,playing:rPlay,cleared:rCleared,failed:rFailed,allClear:rAllClear})[name]()}

function rTitle(){
  app.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;gap:14px">
    <div style="animation:titleFloat 3s ease-in-out infinite">${shimaSVG('happy',130)}</div>
    <h1 style="font-family:'Zen Maru Gothic',sans-serif;font-size:36px;font-weight:900;color:#FFD54F;margin:0;line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,.4);text-align:center">ふりかけ<br><span style="font-size:42px;color:#FF8F00">パラパラ</span></h1>
    <p style="color:#BCAAA4;font-size:13px;font-weight:600;letter-spacing:.15em">〜 シマエナガのふりかけ屋さん 〜</p>
    <div style="background:rgba(255,255,255,.06);border-radius:18px;padding:16px 22px;max-width:320px;text-align:center;border:1px solid rgba(255,213,79,.15)"><p style="margin:0;font-size:13px;color:#D7CCC8;line-height:2;font-weight:500">🍚 全${ML}レベルをクリアしよう！<br>📦 ふりかけを選んでご飯にのせてね<br>⏱ 各レベル <strong style="color:#FFD54F">${LT}秒</strong><br>💀 <strong style="color:#EF9A9A">${MM}回</strong>ミスで失敗<br>🔥 レベルが上がると難しくなるよ！</p></div>
    <button class="bm" id="startBtn" style="animation:pulse 2s ease-in-out infinite;margin-top:8px;font-size:20px;padding:16px 52px">はじめる！</button>
  </div>`;
  document.getElementById('startBtn').addEventListener('click',()=>{sndShu();show('levelSelect')});
}

function rLevelSel(){
  let grid='';
  for(let i=1;i<=ML;i++){const cc=cfg(i),cl=G.clr.has(i),ok=i===1||G.clr.has(i-1);
    const bg=cl?'linear-gradient(135deg,#4CAF50,#2E7D32)':ok?'linear-gradient(135deg,#FF8F00,#E65100)':'rgba(255,255,255,.05)';
    const bd=cl?'2px solid #66BB6A':ok?'2px solid #FFB74D':'2px solid rgba(255,255,255,.08)';
    const bars=Array.from({length:cc.conv},()=>`<div style="width:8px;height:3px;border-radius:1px;background:rgba(255,255,255,${ok?.5:.2})"></div>`).join('');
    grid+=`<button data-lv="${i}" data-ok="${ok?1:0}" style="background:${bg};border:${bd};border-radius:12px;padding:8px 4px;opacity:${ok?1:.35};cursor:${ok?'pointer':'not-allowed'};display:flex;flex-direction:column;align-items:center;gap:2px"><span style="font-size:16px;font-weight:900;color:white">${cl?'⭐':i}</span><div style="display:flex;gap:1px">${bars}</div></button>`;}
  app.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px 16px;gap:12px">
    <div style="display:flex;align-items:center;gap:8px">${shimaSVG('normal',50)}<h2 style="font-family:'Zen Maru Gothic',sans-serif;font-size:22px;font-weight:900;color:#FFD54F;margin:0">レベルせんたく</h2></div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-width:360px;width:100%">${grid}</div>
    <div style="background:rgba(255,255,255,.05);border-radius:14px;padding:12px 18px;max-width:360px;width:100%"><p style="margin:0;font-size:11px;color:#BCAAA4;line-height:1.8">各レベル ${LT}秒以内に規定数クリアで合格！</p></div>
    <button class="bs" id="backBtn">もどる</button>
  </div>`;
  document.querySelectorAll('[data-lv]').forEach(b=>b.addEventListener('click',function(){if(this.dataset.ok==='1'){sndShu();startLv(+this.dataset.lv)}}));
  document.getElementById('backBtn').addEventListener('click',()=>show('title'));
}

function startLv(l){
  G.lv=l;G.time=LT;G.score=0;G.miss=0;G.sel=[];G.msg=`レベル ${l} スタート！`;G.expr='happy';G.nid=0;G.lt=null;G.sp=[0,1.5,.8];G.active=true;
  const cc=cfg(l),offs=[0,35,18];G.bowls=[];
  for(let i=0;i<cc.conv;i++){const o=offs[i]||0;G.bowls.push({id:++G.nid,lane:i,order:rndF(cc.top),applied:[],progress:5+o,wrong:false,fadeOut:false});G.bowls.push({id:++G.nid,lane:i,order:rndF(cc.top),applied:[],progress:-15+o*.3,wrong:false,fadeOut:false})}
  bgmStart();show('playing');
}

function endLv(res){
  G.active=false;bgmStop();clearInterval(tiv);cancelAnimationFrame(fid);
  if(res==='clear'){G.clr.add(G.lv);G.expr='happy';if(G.lv>=ML){sndCelebrate();G.msg='全クリア！🏆';show('allClear')}else{sndClear();G.msg='クリア！すごい！🎉';show('cleared')}}
  else{sndFail();G.expr='sad';G.msg='残念…もう一回！💪';show('failed')}
}

function rPlay(){
  const cc=cfg(G.lv);
  let lanes='';for(let i=0;i<cc.conv;i++){const h=cc.conv===1?120:cc.conv===2?105:90,th=cc.conv===1?30:cc.conv===2?26:22,rh=cc.conv===1?36:28;
    lanes+=`<div data-lane="${i}" style="position:relative;width:100%;height:${h}px;flex-shrink:0"><div style="position:absolute;left:0;right:0;top:50%;height:${th}px;transform:translateY(-50%);background:linear-gradient(180deg,#5D4037,#4E342E,#3E2723);border-radius:3px;border:2px solid #6D4C41;overflow:hidden"><div style="position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0px,rgba(255,255,255,.04) 2px,transparent 2px,transparent 40px);animation:conveyorMove 1.5s linear infinite"></div></div><div style="position:absolute;left:-3px;top:50%;transform:translateY(-50%);width:10px;height:${rh}px;border-radius:5px;background:#795548;border:2px solid #8D6E63"></div><div style="position:absolute;right:-3px;top:50%;transform:translateY(-50%);width:10px;height:${rh}px;border-radius:5px;background:#795548;border:2px solid #8D6E63"></div><div style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#E53935;font-size:14px;font-weight:900;opacity:.4">▸▸</div></div>`}
  let furiGrid='';F.forEach(f=>{furiGrid+=`<button data-fid="${f.id}" style="background:linear-gradient(135deg,${f.color},${f.accent});border:2px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;transition:all .12s"><span style="font-size:18px">${f.emoji}</span><span style="font-size:9px;font-weight:700;color:white;text-shadow:0 1px 3px rgba(0,0,0,.5)">${f.name}</span></button>`});
  app.innerHTML=`<div id="gameWrap" style="display:flex;flex-direction:column;height:100vh;padding:6px 10px;gap:4px;box-sizing:border-box">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:0 2px"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:14px;font-weight:900;color:#FFD54F;font-family:'Zen Maru Gothic',sans-serif;background:rgba(255,213,79,.15);border-radius:8px;padding:2px 10px">Lv.${G.lv}</span><span id="hScore" style="font-size:14px;font-weight:700;color:#A5D6A7">🍚 ${G.score}/${cc.req}</span></div><div id="hTime" style="font-size:22px;font-weight:900;color:#4CAF50;font-family:'Zen Maru Gothic',sans-serif">${G.time}s</div></div>
    <div style="width:100%;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden"><div id="tBar" style="height:100%;width:100%;background:#4CAF50;border-radius:3px;transition:width 1s linear"></div></div>
    <div id="hMiss" style="display:flex;gap:3px;justify-content:center"></div>
    <div style="display:flex;align-items:flex-end;gap:5px;padding:0 2px"><div id="hShima" style="flex-shrink:0">${shimaSVG(G.expr,52)}</div><div id="hMsg" style="background:rgba(255,255,255,.08);border-radius:10px 10px 10px 4px;padding:5px 10px;font-size:11px;font-weight:600;color:#FFE0B2;flex:1;border:1px solid rgba(255,255,255,.06);line-height:1.4">${G.msg}</div></div>
    <div id="convArea" style="display:flex;flex-direction:column;gap:8px;flex:1;justify-content:center;min-height:0">${lanes}</div>
    <div id="hSel" style="text-align:center;font-size:11px;font-weight:700;color:rgba(255,255,255,.25);min-height:16px;flex-shrink:0">↓ ふりかけを選んでね ↓</div>
    <div id="fGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 2px 10px;flex-shrink:0">${furiGrid}</div>
  </div>`;
  document.querySelectorAll('[data-fid]').forEach(b=>b.addEventListener('click',function(){sndShu();toggleSel(this.dataset.fid)}));
  updMiss();updBowls();
  tiv=setInterval(()=>{G.time--;updTime();if(G.time<=0)endLv('fail')},1000);
  const loop=ts=>{
    if(!G.active)return;if(!G.lt)G.lt=ts;const dt=Math.min((ts-G.lt)/1000,.1);G.lt=ts;
    G.bowls.forEach(b=>{b.progress+=(100/cc.spd)*dt});
    const gone=G.bowls.filter(b=>b.progress>108);let mc=0;
    gone.forEach(b=>{const r=b.order.map(o=>o.id);b.applied.forEach(a=>{const i=r.indexOf(a.id);if(i>=0)r.splice(i,1)});if(r.length>0&&!b.wrong)mc++});
    if(mc>0){G.miss+=mc;G.expr='sad';G.msg='流れちゃった…💦';updMiss();updShima();updMsg();const gw=document.getElementById('gameWrap');if(gw){gw.style.animation='screenShake .3s ease';setTimeout(()=>gw.style.animation='',300)}if(G.miss>=MM){G.bowls=G.bowls.filter(b=>b.progress<=108);updBowls();endLv('fail');return}setTimeout(()=>{G.expr='normal';updShima()},400)}
    G.bowls=G.bowls.filter(b=>b.progress<=108);
    for(let lane=0;lane<cc.conv;lane++){G.sp[lane]+=dt;const pn=Math.ceil((cc.req+2)/cc.conv),si=Math.min(cc.spd*.3,LT/(pn+1));const lb=G.bowls.filter(b=>b.lane===lane&&!b.wrong&&!b.fadeOut);if(G.sp[lane]>=si&&lb.length<4){const last=lb[lb.length-1];if(!last||last.progress>15){G.sp[lane]=0;G.bowls.push({id:++G.nid,lane,order:rndF(cc.top),applied:[],progress:-10,wrong:false,fadeOut:false})}}}
    updBowls();fid=requestAnimationFrame(loop);
  };
  fid=requestAnimationFrame(loop);
}

function toggleSel(id){const i=G.sel.findIndex(s=>s.id===id);if(i>=0)G.sel.splice(i,1);else{const f=F.find(x=>x.id===id);if(f)G.sel.push(f)}updFGrid();updSelDisp()}
function applyBowl(bid){
  if(!G.sel.length)return;const bi=G.bowls.findIndex(b=>b.id===bid);if(bi<0)return;
  const bowl=G.bowls[bi];if(bowl.wrong||bowl.fadeOut)return;
  const rem=bowl.order.map(o=>o.id);bowl.applied.forEach(a=>{const i=rem.indexOf(a.id);if(i>=0)rem.splice(i,1)});
  const sids=G.sel.map(s=>s.id),chk=[...rem];let ok=sids.length===chk.length;
  if(ok)for(const s of sids){const i=chk.indexOf(s);if(i<0){ok=false;break}chk.splice(i,1)}
  const cc=cfg(G.lv);
  if(ok){sndSa();bowl.applied.push(...G.sel);bowl.fadeOut=true;G.score++;G.sel=[];G.expr='happy';
    if(G.score>=cc.req)setTimeout(()=>endLv('clear'),300);
    else{const ms=["ナイス！🎵","いいね！✨","おいしそう！🤤","すばらしい！💫"];G.msg=`${ms[(Math.random()*ms.length)|0]} (${G.score}/${cc.req})`}
    updScore();updMsg();updShima();setTimeout(()=>{G.expr='normal';G.bowls=G.bowls.filter(b=>b.id!==bid);updBowls();updShima()},350);
  }else{sndMiss();bowl.wrong=true;G.sel=[];G.miss++;G.expr='panic';G.msg='ちがう！注文を確認して！😱';
    const gw=document.getElementById('gameWrap');if(gw){gw.style.animation='screenShake .3s ease';setTimeout(()=>gw.style.animation='',300)}
    updMiss();updMsg();updShima();setTimeout(()=>{G.expr='normal';G.bowls=G.bowls.filter(b=>b.id!==bid);updBowls();updShima()},500);
    if(G.miss>=MM)setTimeout(()=>endLv('fail'),400);
  }
  updFGrid();updSelDisp();
}

function updBowls(){const cc=cfg(G.lv);for(let lane=0;lane<cc.conv;lane++){const el=document.querySelector(`[data-lane="${lane}"]`);if(!el)continue;el.querySelectorAll('.bw').forEach(b=>b.remove());
  G.bowls.filter(b=>b.lane===lane).forEach(bowl=>{const rem=bowl.order.map(o=>o.id);bowl.applied.forEach(a=>{const i=rem.indexOf(a.id);if(i>=0)rem.splice(i,1)});const done=rem.length===0;
    let tags='<div style="display:flex;gap:2px;justify-content:center;margin-bottom:3px">';
    bowl.order.forEach((o,i)=>{const nc=bowl.order.filter((x,j)=>j<=i&&x.id===o.id).length;const ac2=bowl.applied.filter(a=>a.id===o.id).length;const d=ac2>=nc;
      tags+=`<div style="background:${d?`linear-gradient(135deg,${o.color}55,${o.accent}55)`:`linear-gradient(135deg,${o.color},${o.accent})`};border:2px solid ${o.color};border-radius:7px;padding:1px 5px;font-size:12px;opacity:${d?.5:1};box-shadow:${d?'none':`0 0 6px ${o.color}50`}">${o.emoji}</div>`});
    tags+='</div>';
    const fill=bowl.wrong?'#FFCDD2':done?'#C8E6C9':'#F0E4D0',stroke=bowl.wrong?'#E53935':done?'#4CAF50':'#C4A882';
    let app2='';bowl.applied.forEach((f,fi)=>{const p=[{x:50,y:57},{x:90,y:57},{x:70,y:50}][fi]||{x:70,y:54};app2+=`<text x="${p.x}" y="${p.y}" text-anchor="middle" font-size="18" dominant-baseline="central">${f.emoji}</text>`});
    const danger=bowl.progress>75&&!done&&!bowl.wrong?'<div style="position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:#E53935;color:white;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;animation:dangerPulse .35s ease infinite">!</div>':'';
    const d=document.createElement('div');d.className='bw';d.dataset.bid=bowl.id;
    d.style.cssText=`position:absolute;left:${bowl.progress}%;top:50%;transform:translate(-50%,-50%);z-index:10;opacity:${done?(bowl.fadeOut?0:1):bowl.wrong?.6:1};transition:opacity .3s;pointer-events:${done||bowl.wrong?'none':'auto'};cursor:${G.sel.length>0&&!done&&!bowl.wrong?'pointer':'default'}`;
    d.innerHTML=tags+`<svg width="70" height="55" viewBox="0 0 140 110"><ellipse cx="70" cy="105" rx="40" ry="5" fill="rgba(0,0,0,.06)"/><path d="M 24 55 Q 24 100 70 100 Q 116 100 116 55" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/><ellipse cx="70" cy="55" rx="46" ry="15" fill="#FEFEFE"/>${app2}${done?'<text x="70" y="72" text-anchor="middle" font-size="22">✓</text>':''}${bowl.wrong?'<text x="70" y="72" text-anchor="middle" font-size="22">✗</text>':''}</svg>`+danger;
    d.addEventListener('click',()=>applyBowl(bowl.id));
    el.appendChild(d);
  })}}
function updTime(){const el=document.getElementById('hTime'),bar=document.getElementById('tBar');if(!el)return;const c=G.time<=5?'#E53935':G.time<=10?'#FF9800':'#4CAF50';el.style.color=c;el.textContent=G.time+'s';if(G.time<=5)el.style.animation='heartBeat .5s ease infinite';if(bar){bar.style.width=(G.time/LT*100)+'%';bar.style.backgroundColor=c}}
function updScore(){const el=document.getElementById('hScore');if(el){const cc=cfg(G.lv);el.textContent=`🍚 ${G.score}/${cc.req}`}}
function updMiss(){const el=document.getElementById('hMiss');if(!el)return;el.innerHTML='';for(let i=0;i<MM;i++)el.innerHTML+=`<div style="width:14px;height:14px;border-radius:50%;background:${i<G.miss?'#E53935':'rgba(255,255,255,.08)'};border:2px solid ${i<G.miss?'#B71C1C':'rgba(255,255,255,.12)'};font-size:8px;color:white;font-weight:900;display:flex;align-items:center;justify-content:center">${i<G.miss?'✕':''}</div>`}
function updMsg(){const el=document.getElementById('hMsg');if(el)el.textContent=G.msg}
function updShima(){const el=document.getElementById('hShima');if(el)el.innerHTML=shimaSVG(G.expr,52)}
function updSelDisp(){const el=document.getElementById('hSel');if(!el)return;if(G.sel.length>0){el.style.color='#FFE0B2';el.innerHTML='手持ち: '+G.sel.map(s=>`<span style="color:${s.color};margin-right:3px">${s.emoji}</span>`).join('')+' → ご飯をタップ！'}else{el.style.color='rgba(255,255,255,.25)';el.textContent='↓ ふりかけを選んでね ↓'}}
function updFGrid(){document.querySelectorAll('[data-fid]').forEach(btn=>{const id=btn.dataset.fid,f=F.find(x=>x.id===id),s=G.sel.some(x=>x.id===id);btn.style.background=s?`linear-gradient(135deg,${f.color}55,${f.accent}55)`:`linear-gradient(135deg,${f.color},${f.accent})`;btn.style.border=s?`3px solid ${f.color}`:'2px solid rgba(255,255,255,.08)';btn.style.opacity=s?.5:1;btn.style.transform=s?'scale(.94)':'scale(1)';const old=btn.querySelector('.ck');if(old)old.remove();if(s){const ck=document.createElement('div');ck.className='ck';ck.style.cssText='position:absolute;top:-3px;right:-3px;width:14px;height:14px;border-radius:50%;background:#FFD54F;color:#3E2723;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center';ck.textContent='✓';btn.appendChild(ck)}})}

function rCleared(){
  app.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;gap:14px">
    <div style="font-size:48px;animation:starSpin 1s ease">⭐</div>${shimaSVG('happy',100)}
    <div style="background:rgba(255,255,255,.06);border-radius:22px;padding:22px 28px;text-align:center;border:1px solid rgba(76,175,80,.2);max-width:340px;width:100%"><p style="font-size:14px;color:#A5D6A7;margin:0 0 4px;font-weight:700;letter-spacing:.1em">LEVEL ${G.lv} CLEAR!</p><p style="margin:8px 0 0;font-size:15px;color:#FFE0B2;font-weight:600;line-height:1.6">${G.msg}</p></div>
    ${G.lv<ML?'<button class="bm" id="nextBtn" style="animation:pulse 2s ease infinite">次のレベルへ！</button>':''}
    <button class="bs" id="selBtn">レベル選択へ</button>
  </div>`;
  if(document.getElementById('nextBtn'))document.getElementById('nextBtn').addEventListener('click',()=>startLv(G.lv+1));
  document.getElementById('selBtn').addEventListener('click',()=>show('levelSelect'));
}

function rFailed(){
  const cc=cfg(G.lv);
  app.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;gap:14px">
    ${shimaSVG('sad',100)}
    <div style="background:rgba(255,255,255,.06);border-radius:22px;padding:22px 28px;text-align:center;border:1px solid rgba(229,57,53,.2);max-width:340px;width:100%"><p style="font-size:14px;color:#EF9A9A;margin:0 0 4px;font-weight:700;letter-spacing:.1em">LEVEL ${G.lv} FAILED</p><p style="margin:8px 0 0;font-size:14px;color:#FFE0B2;font-weight:600">${G.miss>=MM?`ミス${MM}回…💦`:'時間切れ…⏱️'}</p><p style="margin:4px 0 0;font-size:13px;color:#BCAAA4">完成: ${G.score}/${cc.req}</p></div>
    <button class="bm" id="retryBtn" style="animation:pulse 2s ease infinite">もういちど！</button>
    <button class="bs" id="selBtn">レベル選択へ</button>
  </div>`;
  document.getElementById('retryBtn').addEventListener('click',()=>startLv(G.lv));
  document.getElementById('selBtn').addEventListener('click',()=>show('levelSelect'));
}

function rAllClear(){
  const cols=["#FFD54F","#FF8F00","#E53935","#4CAF50","#2196F3","#E040FB","#FF6F00","#00BCD4"];
  let conf='';for(let i=0;i<40;i++){const sz=6+Math.random()*8;conf+=`<div style="position:absolute;left:${Math.random()*100}%;top:-20px;width:${sz}px;height:${sz*(0.6+Math.random()*.8)}px;background:${cols[i%8]};border-radius:${Math.random()>.5?'50%':'2px'};animation:confettiFall ${2.5+Math.random()*2}s linear ${Math.random()*2}s infinite;opacity:.8;z-index:0"></div>`}
  app.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;gap:10px;position:relative;overflow:hidden">
    ${conf}
    <div style="position:absolute;top:10%;left:50%;width:500px;height:500px;background:radial-gradient(circle,rgba(255,213,79,.25),transparent 70%);transform:translateX(-50%);pointer-events:none"></div>
    <div style="font-size:56px;animation:starSpin 2s ease infinite;z-index:1">🏆</div>
    <div style="font-family:'Zen Maru Gothic',sans-serif;font-size:40px;font-weight:900;background:linear-gradient(135deg,#FFD54F,#FF8F00,#E65100);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:omedetouPop .8s ease both,glowPulse 2s ease-in-out infinite;z-index:1">おめでとう！</div>
    <div style="animation:shimaDance 1.2s ease-in-out infinite;z-index:1">${shimaSVG('happy',140)}</div>
    <div style="background:rgba(255,255,255,.1);border-radius:18px;padding:14px 24px;text-align:center;border:1px solid rgba(255,213,79,.2);max-width:320px;width:100%;z-index:1;animation:popIn .5s ease .5s both"><p style="font-size:15px;font-weight:700;color:#FFE0B2;margin:0;line-height:1.8">🎊 全20レベルクリア！🎊<br>キミは伝説のふりかけ職人だ！<br>シマエナガも大喜び！🐦✨</p></div>
    <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;max-width:300px;z-index:1;animation:popIn .5s ease .8s both">${F.map((f,i)=>`<span style="font-size:24px;animation:popIn .3s ease ${1+i*.1}s both">${f.emoji}</span>`).join('')}</div>
    <button class="bm" id="selBtn" style="z-index:1;animation:popIn .5s ease 1.5s both">レベル選択へ</button>
  </div>`;
  document.getElementById('selBtn').addEventListener('click',()=>show('levelSelect'));
}

show('title');
</script>
</body>
</html>
