<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audio Test</title>
</head>
<body style="margin:0;background:#222;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;padding:20px">

<p style="font-size:13px;color:#888">iPhoneで音が出るかテスト</p>

<button id="btnA" style="font-size:22px;padding:18px 36px;border-radius:14px;border:none;background:#E53935;color:#fff;width:90%;max-width:300px">A: WebAudio API</button>

<button id="btnB" style="font-size:22px;padding:18px 36px;border-radius:14px;border:none;background:#FF8F00;color:#fff;width:90%;max-width:300px">B: new Audio(Blob)</button>

<button id="btnC" style="font-size:22px;padding:18px 36px;border-radius:14px;border:none;background:#4CAF50;color:#fff;width:90%;max-width:300px">C: DOM audio要素</button>

<div id="log" style="font-size:13px;color:#ccc;margin-top:10px;width:90%;max-width:300px"></div>

<script>
function log(msg) {
  var el = document.getElementById('log');
  el.innerHTML = msg + '<br>' + el.innerHTML;
}

function makeWavBlob(freq, dur, vol) {
  var sr = 22050;
  var n = Math.floor(sr * dur);
  var buf = new ArrayBuffer(44 + n * 2);
  var v = new DataView(buf);
  // "RIFF"
  v.setUint8(0,82);v.setUint8(1,73);v.setUint8(2,70);v.setUint8(3,70);
  v.setUint32(4, 36 + n * 2, true);
  // "WAVE"
  v.setUint8(8,87);v.setUint8(9,65);v.setUint8(10,86);v.setUint8(11,69);
  // "fmt "
  v.setUint8(12,102);v.setUint8(13,109);v.setUint8(14,116);v.setUint8(15,32);
  v.setUint32(16, 16, true);
  v.setUint16(20, 1, true);
  v.setUint16(22, 1, true);
  v.setUint32(24, sr, true);
  v.setUint32(28, sr * 2, true);
  v.setUint16(32, 2, true);
  v.setUint16(34, 16, true);
  // "data"
  v.setUint8(36,100);v.setUint8(37,97);v.setUint8(38,116);v.setUint8(39,97);
  v.setUint32(40, n * 2, true);
  for (var i = 0; i < n; i++) {
    var t = i / sr;
    var env = Math.max(0, 1 - t / dur) * vol;
    var sample = Math.sin(2 * Math.PI * freq * t) * env;
    v.setInt16(44 + i * 2, Math.floor(sample * 32767), true);
  }
  return new Blob([buf], { type: 'audio/wav' });
}

// A: WebAudio API
document.getElementById('btnA').addEventListener('touchend', function(e) {
  e.preventDefault();
  try {
    var AC = window.AudioContext || window.webkitAudioContext;
    var ctx = new AC();
    log('A: created, state=' + ctx.state);
    ctx.resume().then(function() {
      var o = ctx.createOscillator();
      o.type = 'sine';
      o.frequency.value = 440;
      o.connect(ctx.destination);
      o.start();
      o.stop(ctx.currentTime + 0.3);
      log('A: playing, state=' + ctx.state);
    });
  } catch(e) {
    log('A: error ' + e.message);
  }
});

// B: new Audio with Blob URL
var blobUrl = null;
document.getElementById('btnB').addEventListener('touchend', function(e) {
  e.preventDefault();
  try {
    if (!blobUrl) {
      var blob = makeWavBlob(440, 0.3, 0.5);
      blobUrl = URL.createObjectURL(blob);
      log('B: blob created, size=' + blob.size);
    }
    var a = new Audio(blobUrl);
    a.play().then(function() {
      log('B: play OK!');
    }).catch(function(e) {
      log('B: play error: ' + e.message);
    });
  } catch(e) {
    log('B: error ' + e.message);
  }
});

// C: DOM audio element (closest to article method)
var audioEl = null;
document.getElementById('btnC').addEventListener('touchend', function(e) {
  e.preventDefault();
  try {
    if (!audioEl) {
      var blob = makeWavBlob(880, 0.3, 0.5);
      var url = URL.createObjectURL(blob);
      audioEl = document.createElement('audio');
      audioEl.src = url;
      audioEl.preload = 'auto';
      document.body.appendChild(audioEl);
      log('C: audio element created');
    }
    audioEl.currentTime = 0;
    audioEl.play().then(function() {
      log('C: play OK!');
    }).catch(function(e) {
      log('C: play error: ' + e.message);
    });
  } catch(e) {
    log('C: error ' + e.message);
  }
});

log('Ready. タップしてテスト');
</script>
</body>
</html>
