var LT=20,ML=20,MM=3;
var LV=[[1,30,1,3],[1,15,1,3],[1,10,1,3],[1,5,1,4],[1,20,2,3],[1,10,2,4],[1,15,3,4],[1,10,3,4],[2,15,1,4],[2,10,1,5],[2,5,1,5],[2,20,2,5],[2,10,2,5],[3,15,1,5],[3,7,1,5],[3,15,2,5],[3,15,3,6],[3,10,2,6],[3,15,3,6],[3,10,3,6]];
function cfg(l){var a=LV[Math.min(l-1,19)];return{conv:a[0],spd:a[1],top:a[2],req:a[3]}}
function rndF(n){var a=F.slice().sort(function(){return Math.random()-.5});return a.slice(0,n)}

// Audio - Blob URL + new Audio() method (works on iPhone Safari)
function makeWav(freq, dur, vol, type) {
  var sr=22050, n=Math.floor(sr*dur);
  var buf=new ArrayBuffer(44+n*2), v=new DataView(buf);
  v.setUint8(0,82);v.setUint8(1,73);v.setUint8(2,70);v.setUint8(3,70);
  v.setUint32(4,36+n*2,true);
  v.setUint8(8,87);v.setUint8(9,65);v.setUint8(10,86);v.setUint8(11,69);
  v.setUint8(12,102);v.setUint8(13,109);v.setUint8(14,116);v.setUint8(15,32);
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
  v.setUint8(36,100);v.setUint8(37,97);v.setUint8(38,116);v.setUint8(39,97);
  v.setUint32(40,n*2,true);
  for(var i=0;i<n;i++){
    var t=i/sr, env=Math.max(0,1-t/dur)*vol, sample=0;
    if(type==='sine') sample=Math.sin(2*Math.PI*freq*t)*env;
    else if(type==='tri') sample=(2*Math.abs(2*(freq*t%1)-1)-1)*env;
    else if(type==='noise') sample=(Math.random()*2-1)*env;
    else if(type==='square') sample=(Math.sin(2*Math.PI*freq*t)>0?1:-1)*env;
    v.setInt16(44+i*2,Math.floor(Math.max(-1,Math.min(1,sample))*32767),true);
  }
  return URL.createObjectURL(new Blob([buf],{type:'audio/wav'}));
}

// Combine multiple tones into one WAV
function makeChordWav(notes, totalDur, vol) {
  var sr=22050, n=Math.floor(sr*totalDur);
  var buf=new ArrayBuffer(44+n*2), v=new DataView(buf);
  v.setUint8(0,82);v.setUint8(1,73);v.setUint8(2,70);v.setUint8(3,70);
  v.setUint32(4,36+n*2,true);
  v.setUint8(8,87);v.setUint8(9,65);v.setUint8(10,86);v.setUint8(11,69);
  v.setUint8(12,102);v.setUint8(13,109);v.setUint8(14,116);v.setUint8(15,32);
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
  v.setUint8(36,100);v.setUint8(37,97);v.setUint8(38,116);v.setUint8(39,97);
  v.setUint32(40,n*2,true);
  // notes: [{freq, start, dur, vol, type}]
  for(var i=0;i<n;i++){
    var t=i/sr, sample=0;
    for(var j=0;j<notes.length;j++){
      var note=notes[j];
      var nt=t-note.start;
      if(nt>=0 && nt<note.dur){
        var env=Math.max(0,1-nt/note.dur)*(note.vol||vol);
        if(note.type==='tri') sample+=(2*Math.abs(2*(note.freq*nt%1)-1)-1)*env;
        else if(note.type==='noise') sample+=(Math.random()*2-1)*env;
        else sample+=Math.sin(2*Math.PI*note.freq*nt)*env;
      }
    }
    v.setInt16(44+i*2,Math.floor(Math.max(-1,Math.min(1,sample*0.5))*32767),true);
  }
  return URL.createObjectURL(new Blob([buf],{type:'audio/wav'}));
}

// Pre-generate all sound effects as Blob URLs
var SND={};
function initSounds(){
  SND.shu=makeWav(5000,0.12,0.3,'noise');
  SND.sa=makeWav(3500,0.22,0.6,'noise');
  SND.miss=makeWav(150,0.15,0.3,'square');
  SND.clear=makeChordWav([
    {freq:523,start:0,dur:0.35,vol:0.4,type:'tri'},
    {freq:659,start:0.12,dur:0.35,vol:0.4,type:'tri'},
    {freq:784,start:0.24,dur:0.35,vol:0.4,type:'tri'},
    {freq:1047,start:0.4,dur:0.7,vol:0.5,type:'tri'},
    {freq:1047*2,start:0.42,dur:0.4,vol:0.15},
  ], 1.2, 0.3);
  SND.fail=makeChordWav([
    {freq:330,start:0,dur:0.3,vol:0.3,type:'tri'},
    {freq:294,start:0.25,dur:0.3,vol:0.3,type:'tri'},
    {freq:262,start:0.5,dur:0.35,vol:0.3,type:'tri'},
  ], 0.9, 0.3);
  SND.celebrate=makeChordWav([
    {freq:523,start:0,dur:0.25,vol:0.3,type:'tri'},
    {freq:659,start:0.15,dur:0.25,vol:0.3,type:'tri'},
    {freq:784,start:0.3,dur:0.3,vol:0.3,type:'tri'},
    {freq:1047,start:0.5,dur:0.5,vol:0.4,type:'tri'},
    {freq:1175,start:0.8,dur:0.3,vol:0.3,type:'tri'},
    {freq:1319,start:1.0,dur:0.3,vol:0.3,type:'tri'},
    {freq:1568,start:1.2,dur:0.6,vol:0.4,type:'tri'},
    {freq:2093,start:1.6,dur:0.8,vol:0.35,type:'tri'},
    {freq:131,start:0,dur:0.4,vol:0.25},
    {freq:196,start:0.5,dur:0.4,vol:0.25},
    {freq:262,start:1.0,dur:0.4,vol:0.25},
  ], 2.5, 0.3);
  // BGM: generate a loop - matching original JSX tempo
  var bgmNotes=[];
  var mel=[523,587,659,784,880,784,659,587,523,659,784,880,784,659,523,587,880,784,659,523,587,659,784,659,523,587,659,784,880,1047,880,784];
  var bas=[131,131,165,165,196,196,165,165,131,131,196,196,220,220,196,196];
  var bpm=140, eighthNote=60/bpm/2, noteDur=eighthNote*0.7;
  for(var i=0;i<mel.length;i++){
    bgmNotes.push({freq:mel[i],start:i*eighthNote,dur:noteDur,vol:0.15,type:'tri'});
  }
  for(var i=0;i<bas.length;i++){
    bgmNotes.push({freq:bas[i],start:i*eighthNote*2,dur:eighthNote*1.8,vol:0.12});
  }
  var loopDur=mel.length*eighthNote;
  SND.bgm=makeChordWav(bgmNotes, loopDur, 0.2);
  SND.bgmDur=loopDur;
}

// Simple audio: 1 Audio element per sound, reuse it
var AUD={};
function initAudioEls(){
  var names=['shu','sa','miss','clear','fail','celebrate'];
  for(var i=0;i<names.length;i++){
    var name=names[i];
    if(!SND[name])continue;
    var a=new Audio(SND[name]);
    a.preload='auto';
    AUD[name]=a;
  }
}
function playSound(name){
  try{
    if(!AUD[name])return;
    AUD[name].currentTime=0;
    AUD[name].play().catch(function(){});
  }catch(e){}
}

function sndShu(){playSound('shu')}
function sndSa(){playSound('sa')}
function sndMiss(){playSound('miss')}
function sndClear(){playSound('clear')}
function sndFail(){playSound('fail')}
function sndCelebrate(){playSound('celebrate')}

var _bgmAudio=null,_bgmTimer=null;
function bgmStart(){
  try{
    bgmStop();
    function loop(){
      _bgmAudio=new Audio(SND.bgm);
      _bgmAudio.play().catch(function(){});
      _bgmTimer=setTimeout(loop, SND.bgmDur*1000);
    }
    loop();
  }catch(e){}
}
function bgmStop(){
  if(_bgmTimer){clearTimeout(_bgmTimer);_bgmTimer=null}
  if(_bgmAudio){try{_bgmAudio.pause();_bgmAudio.currentTime=0}catch(e){}_bgmAudio=null}
}

// Initialize sounds immediately
initSounds();
initAudioEls();

function shimaSVG(expr,size){var eyes=expr==='happy'?'<path d="M46 35Q49 31 52 35" stroke="#1A1A1A" stroke-width="2" fill="none"/><path d="M68 35Q71 31 74 35" stroke="#1A1A1A" stroke-width="2" fill="none"/>':expr==='panic'?'<circle cx="49" cy="33" r="4" fill="#1A1A1A"/><circle cx="71" cy="33" r="4" fill="#1A1A1A"/><circle cx="50.5" cy="31.5" r="1.5" fill="#fff"/><circle cx="72.5" cy="31.5" r="1.5" fill="#fff"/><ellipse cx="60" cy="48" rx="4" ry="3" fill="#1A1A1A"/>':expr==='sad'?'<path d="M46 36Q49 34 52 36" stroke="#1A1A1A" stroke-width="2" fill="none"/><path d="M68 36Q71 34 74 36" stroke="#1A1A1A" stroke-width="2" fill="none"/>':'<circle cx="49" cy="35" r="3" fill="#1A1A1A"/><circle cx="71" cy="35" r="3" fill="#1A1A1A"/><circle cx="50" cy="34" r="1" fill="#fff"/><circle cx="72" cy="34" r="1" fill="#fff"/>';var anim=expr==='panic'?'shimaPanic .3s ease infinite':expr==='happy'?'shimaHappy .5s ease':'shimaIdle 2.5s ease-in-out infinite';return'<svg width="'+size+'" height="'+size+'" viewBox="0 0 120 120" style="filter:drop-shadow(0 3px 6px rgba(0,0,0,.12));animation:'+anim+'"><ellipse cx="60" cy="70" rx="36" ry="34" fill="#FAFAFA" stroke="#E0E0E0"/><circle cx="60" cy="38" r="27" fill="#FEFEFE" stroke="#E8E8E8"/><ellipse cx="60" cy="18" rx="15" ry="9" fill="#FEFEFE"/><ellipse cx="50" cy="20" rx="7" ry="5" fill="#fff"/><ellipse cx="70" cy="20" rx="7" ry="5" fill="#fff"/><path d="M38 35Q48 38 52 36" stroke="#1A1A1A" stroke-width="3.5" fill="none"/><path d="M68 36Q72 38 82 35" stroke="#1A1A1A" stroke-width="3.5" fill="none"/>'+eyes+'<ellipse cx="60" cy="42" rx="3" ry="2" fill="#FFB74D"/><ellipse cx="42" cy="40" rx="5" ry="3" fill="#FFCDD2" opacity=".5"/><ellipse cx="78" cy="40" rx="5" ry="3" fill="#FFCDD2" opacity=".5"/><path d="M88 77Q108 62 113 47" stroke="#E0E0E0" stroke-width="3" fill="none"/><path d="M48 100L45 110M48 100L48 110M48 100L51 110" stroke="#FFB74D" stroke-width="2" fill="none"/><path d="M72 100L69 110M72 100L72 110M72 100L75 110" stroke="#FFB74D" stroke-width="2" fill="none"/></svg>'}

var app=document.getElementById('app');
var G={lv:1,clr:{},time:LT,score:0,miss:0,sel:[],bowls:[],msg:'',expr:'normal',active:false,nid:0,lt:null,sp:[0,0,0]};
var fid=null,tiv=null;

function tap(el,fn){
  var touched=false;
  el.addEventListener('touchstart',function(e){e.preventDefault();touched=true;fn();setTimeout(function(){touched=false},400)},{passive:false});
  el.addEventListener('click',function(e){if(!touched)fn()});
}

function show(name){
  app.innerHTML='';
  G.active=false;
  if(fid){cancelAnimationFrame(fid);fid=null}
  if(tiv){clearInterval(tiv);tiv=null}
  if(name==='title')rTitle();
  else if(name==='levelSelect')rLevelSel();
  else if(name==='playing')rPlay();
  else if(name==='cleared')rCleared();
  else if(name==='failed')rFailed();
  else if(name==='allClear')rAllClear();
}

function rTitle(){
  app.innerHTML='<div class="scr" style="justify-content:center;gap:14px;background:linear-gradient(170deg,#2D1B0E,#3E2415 40%,#4A2C1A)"><div style="animation:titleFloat 3s ease-in-out infinite">'+shimaSVG('happy',120)+'</div><div style="text-align:center"><div style="font-size:32px;font-weight:900;color:#FFD54F;line-height:1.2">ふりかけ<br><span style="font-size:38px;color:#FF8F00">パラパラ</span></div><p style="color:#BCAAA4;font-size:12px;font-weight:600;margin-top:6px;letter-spacing:.15em">〜 シマエナガのふりかけ屋さん 〜</p></div><div style="background:rgba(255,255,255,.06);border-radius:16px;padding:14px 18px;max-width:300px;text-align:center;border:1px solid rgba(255,213,79,.15)"><p style="margin:0;font-size:12px;color:#D7CCC8;line-height:1.9">🍚 全'+ML+'レベルをクリアしよう！<br>📦 ふりかけを選んでご飯にのせてね<br>⏱ 各レベル <b style="color:#FFD54F">'+LT+'秒</b><br>💀 <b style="color:#EF9A9A">'+MM+'回</b>ミスで失敗</p></div><button class="bm" id="startBtn" style="animation:pulse 2s ease-in-out infinite;font-size:20px;padding:16px 52px;margin-top:8px">はじめる！</button></div>';
  tap(document.getElementById('startBtn'),function(){sndShu();show('levelSelect')});
}

function rLevelSel(){
  var grid='';
  for(var i=1;i<=ML;i++){var cc=cfg(i),cl=G.clr[i],ok=i===1||G.clr[i-1];
    var bg=cl?'linear-gradient(135deg,#4CAF50,#2E7D32)':ok?'linear-gradient(135deg,#FF8F00,#E65100)':'rgba(255,255,255,.05)';
    var bd=cl?'2px solid #66BB6A':ok?'2px solid #FFB74D':'2px solid rgba(255,255,255,.08)';
    var bars='';for(var j=0;j<cc.conv;j++)bars+='<div style="width:8px;height:3px;border-radius:1px;background:rgba(255,255,255,'+(ok?.5:.2)+')"></div>';
    grid+='<button data-lv="'+i+'" data-ok="'+(ok?1:0)+'" style="background:'+bg+';border:'+bd+';border-radius:12px;padding:8px 4px;opacity:'+(ok?1:.35)+';display:flex;flex-direction:column;align-items:center;gap:2px"><span style="font-size:16px;font-weight:900;color:white">'+(cl?'⭐':i)+'</span><div style="display:flex;gap:1px">'+bars+'</div></button>'}
  app.innerHTML='<div class="scr" style="gap:12px;background:linear-gradient(170deg,#2D1B0E,#3E2415 40%,#4A2C1A)"><div style="display:flex;align-items:center;gap:8px">'+shimaSVG('normal',45)+'<div style="font-size:20px;font-weight:900;color:#FFD54F">レベルせんたく</div></div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-width:340px;width:100%">'+grid+'</div><div style="background:rgba(255,255,255,.05);border-radius:12px;padding:10px 16px;max-width:340px;width:100%"><p style="margin:0;font-size:11px;color:#BCAAA4;line-height:1.8">各レベル '+LT+'秒以内に規定数クリアで合格！</p></div><button class="bs" id="backBtn">もどる</button></div>';
  document.querySelectorAll('[data-lv]').forEach(function(b){tap(b,function(){if(b.dataset.ok==='1'){sndShu();startLv(+b.dataset.lv)}})});
  tap(document.getElementById('backBtn'),function(){show('title')});
}

function startLv(l){
  G.lv=l;G.time=LT;G.score=0;G.miss=0;G.sel=[];G.msg='レベル '+l+' スタート！';G.expr='happy';G.nid=0;G.lt=null;G.sp=[0,1.5,.8];G.active=true;
  var cc=cfg(l),offs=[0,35,18];G.bowls=[];
  for(var i=0;i<cc.conv;i++){var o=offs[i]||0;G.bowls.push({id:++G.nid,lane:i,order:rndF(cc.top),applied:[],progress:5+o,wrong:false,fadeOut:false});G.bowls.push({id:++G.nid,lane:i,order:rndF(cc.top),applied:[],progress:-15+o*.3,wrong:false,fadeOut:false})}
  bgmStart();show('playing');
}

function endLv(res){
  G.active=false;bgmStop();if(tiv){clearInterval(tiv);tiv=null}if(fid){cancelAnimationFrame(fid);fid=null}
  if(res==='clear'){G.clr[G.lv]=true;G.expr='happy';if(G.lv>=ML){sndCelebrate();show('allClear')}else{sndClear();G.msg='クリア！すごい！🎉';show('cleared')}}
  else{sndFail();G.expr='sad';G.msg='残念…もう一回！💪';show('failed')}
}

function rPlay(){
  _needFullRedraw=true;_domBowls={};
  var cc=cfg(G.lv);
  var lanes='';for(var i=0;i<cc.conv;i++){var h=cc.conv===1?110:cc.conv===2?95:80,th=cc.conv===1?28:cc.conv===2?24:20;
    lanes+='<div data-lane="'+i+'" style="position:relative;width:100%;height:'+h+'px;flex-shrink:0"><div style="position:absolute;left:0;right:0;top:50%;height:'+th+'px;transform:translateY(-50%);background:linear-gradient(180deg,#5D4037,#4E342E,#3E2723);border-radius:3px;border:2px solid #6D4C41;overflow:hidden"><div style="position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0,rgba(255,255,255,.04) 2px,transparent 2px,transparent 40px);animation:conveyorMove 1.5s linear infinite"></div></div></div>'}
  var furiGrid='';F.forEach(function(f){furiGrid+='<button data-fid="'+f.id+'" style="background:linear-gradient(135deg,'+f.color+','+f.accent+');border:2px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative"><span style="font-size:18px">'+f.emoji+'</span><span style="font-size:9px;font-weight:700;color:white;text-shadow:0 1px 3px rgba(0,0,0,.5)">'+f.name+'</span></button>'});
  app.innerHTML='<div id="gw" style="display:flex;flex-direction:column;height:100%;padding:6px 10px;gap:3px;box-sizing:border-box;background:linear-gradient(170deg,#2D1B0E,#3E2415 40%,#4A2C1A)"><div style="display:flex;justify-content:space-between;align-items:center;padding:0 2px"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:13px;font-weight:900;color:#FFD54F;background:rgba(255,213,79,.15);border-radius:8px;padding:2px 8px">Lv.'+G.lv+'</span><span id="hS" style="font-size:13px;font-weight:700;color:#A5D6A7">🍚 '+G.score+'/'+cc.req+'</span></div><div id="hT" style="font-size:20px;font-weight:900;color:#4CAF50">'+G.time+'s</div></div><div style="width:100%;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden"><div id="tB" style="height:100%;width:100%;background:#4CAF50;border-radius:3px;transition:width 1s linear"></div></div><div id="hM" style="display:flex;gap:3px;justify-content:center"></div><div style="display:flex;align-items:flex-end;gap:4px;padding:0 2px"><div id="hE" style="flex-shrink:0">'+shimaSVG(G.expr,48)+'</div><div id="hMsg" style="background:rgba(255,255,255,.08);border-radius:10px 10px 10px 4px;padding:4px 8px;font-size:10px;font-weight:600;color:#FFE0B2;flex:1;line-height:1.4">'+G.msg+'</div></div><div id="cA" style="display:flex;flex-direction:column;gap:6px;flex:1;justify-content:center;min-height:0">'+lanes+'</div><div id="hSel" style="text-align:center;font-size:10px;font-weight:700;color:rgba(255,255,255,.25);min-height:14px;flex-shrink:0">↓ ふりかけを選んでね ↓</div><div id="fG" style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:0 2px 8px;flex-shrink:0">'+furiGrid+'</div></div>';
  updMiss();updBowls();
  document.querySelectorAll('[data-fid]').forEach(function(b){tap(b,function(){sndShu();toggleSel(b.dataset.fid)})});
  tiv=setInterval(function(){G.time--;updTime();if(G.time<=0)endLv('fail')},1000);
  G.active=true;G.lt=null;
  function loop(ts){
    if(!G.active)return;if(!G.lt)G.lt=ts;var dt=Math.min((ts-G.lt)/1000,.1);G.lt=ts;
    for(var i=0;i<G.bowls.length;i++)G.bowls[i].progress+=(100/cc.spd)*dt;
    var mc=0;var keep=[];var removed=false;
    for(var i=0;i<G.bowls.length;i++){var b=G.bowls[i];if(b.progress>108){removed=true;var r=b.order.map(function(o){return o.id});b.applied.forEach(function(a){var j=r.indexOf(a.id);if(j>=0)r.splice(j,1)});if(r.length>0&&!b.wrong)mc++}else keep.push(b)}
    if(removed)markRedraw();
    G.bowls=keep;
    if(mc>0){G.miss+=mc;G.expr='sad';G.msg='流れちゃった…💦';updMiss();updShima();updMsg();if(G.miss>=MM){markRedraw();updBowls();endLv('fail');return}setTimeout(function(){G.expr='normal';updShima()},400)}
    for(var lane=0;lane<cc.conv;lane++){G.sp[lane]+=dt;var pn=Math.ceil((cc.req+2)/cc.conv),si=Math.min(cc.spd*.3,LT/(pn+1));var lb=G.bowls.filter(function(b){return b.lane===lane&&!b.wrong&&!b.fadeOut});if(G.sp[lane]>=si&&lb.length<4){var last=lb[lb.length-1];if(!last||last.progress>15){G.sp[lane]=0;G.bowls.push({id:++G.nid,lane:lane,order:rndF(cc.top),applied:[],progress:-10,wrong:false,fadeOut:false});markRedraw()}}}
    updBowls();fid=requestAnimationFrame(loop);
  }
  fid=requestAnimationFrame(loop);
}

function toggleSel(id){var i=-1;for(var j=0;j<G.sel.length;j++)if(G.sel[j].id===id){i=j;break}if(i>=0)G.sel.splice(i,1);else{var f=null;for(var j=0;j<F.length;j++)if(F[j].id===id){f=F[j];break}if(f)G.sel.push(f)}updFGrid();updSelDisp()}

function applyBowl(bid){
  if(!G.sel.length)return;var bi=-1;for(var i=0;i<G.bowls.length;i++)if(G.bowls[i].id===bid){bi=i;break}if(bi<0)return;
  var bowl=G.bowls[bi];if(bowl.wrong||bowl.fadeOut)return;
  var rem=bowl.order.map(function(o){return o.id});bowl.applied.forEach(function(a){var i=rem.indexOf(a.id);if(i>=0)rem.splice(i,1)});
  var sids=G.sel.map(function(s){return s.id}),chk=rem.slice(),ok=sids.length===chk.length;
  if(ok)for(var i=0;i<sids.length;i++){var j=chk.indexOf(sids[i]);if(j<0){ok=false;break}chk.splice(j,1)}
  var cc=cfg(G.lv);
  if(ok){sndSa();for(var i=0;i<G.sel.length;i++)bowl.applied.push(G.sel[i]);bowl.fadeOut=true;G.score++;G.sel=[];G.expr='happy';
    var ms=["ナイス！🎵","いいね！✨","おいしそう！🤤","すばらしい！💫"];G.msg=ms[(Math.random()*ms.length)|0]+' ('+G.score+'/'+cc.req+')';
    updScore();updMsg();updShima();
    if(G.score>=cc.req)setTimeout(function(){endLv('clear')},300);
    setTimeout(function(){G.expr='normal';G.bowls=G.bowls.filter(function(b){return b.id!==bid});markRedraw();updBowls();updShima()},350);
  }else{sndMiss();bowl.wrong=true;G.sel=[];G.miss++;G.expr='panic';G.msg='ちがう！😱';
    updMiss();updMsg();updShima();setTimeout(function(){G.expr='normal';G.bowls=G.bowls.filter(function(b){return b.id!==bid});markRedraw();updBowls();updShima()},500);
    if(G.miss>=MM)setTimeout(function(){endLv('fail')},400);
  }
  updFGrid();updSelDisp();
}

// Track which bowl IDs are currently in DOM
var _domBowls={};
var _needFullRedraw=true;

function markRedraw(){_needFullRedraw=true}

function updBowls(){
  var cc=cfg(G.lv);
  // Check if we need full redraw (bowls added/removed/state changed)
  if(_needFullRedraw){
    _needFullRedraw=false;
    _domBowls={};
    for(var lane=0;lane<cc.conv;lane++){
      var el=document.querySelector('[data-lane="'+lane+'"]');if(!el)continue;
      var old=el.querySelectorAll('.bw');for(var i=0;i<old.length;i++)old[i].remove();
      var lb=G.bowls.filter(function(b){return b.lane===lane});
      for(var bi=0;bi<lb.length;bi++){
        var bowl=lb[bi];
        _domBowls[bowl.id]=createBowlEl(bowl);
        el.appendChild(_domBowls[bowl.id]);
      }
    }
  } else {
    // Fast path: just update positions
    for(var i=0;i<G.bowls.length;i++){
      var bowl=G.bowls[i];
      var el=_domBowls[bowl.id];
      if(el) el.style.left=bowl.progress+'%';
    }
    // Add any new bowls not in DOM
    for(var i=0;i<G.bowls.length;i++){
      var bowl=G.bowls[i];
      if(!_domBowls[bowl.id]){
        var lane=document.querySelector('[data-lane="'+bowl.lane+'"]');
        if(lane){_domBowls[bowl.id]=createBowlEl(bowl);lane.appendChild(_domBowls[bowl.id])}
      }
    }
    // Remove DOM elements for bowls no longer in array
    var activeIds={};
    for(var i=0;i<G.bowls.length;i++)activeIds[G.bowls[i].id]=true;
    for(var id in _domBowls){
      if(!activeIds[id]){
        if(_domBowls[id].parentNode)_domBowls[id].parentNode.removeChild(_domBowls[id]);
        delete _domBowls[id];
      }
    }
  }
}

function createBowlEl(bowl){
  var rem=bowl.order.map(function(o){return o.id});bowl.applied.forEach(function(a){var i=rem.indexOf(a.id);if(i>=0)rem.splice(i,1)});var done=rem.length===0;
  var tags='<div style="display:flex;gap:2px;justify-content:center;margin-bottom:2px">';
  for(var i=0;i<bowl.order.length;i++){var o=bowl.order[i];var nc=0;for(var j=0;j<=i;j++)if(bowl.order[j].id===o.id)nc++;var ac2=0;for(var j=0;j<bowl.applied.length;j++)if(bowl.applied[j].id===o.id)ac2++;var d=ac2>=nc;
    tags+='<div style="background:'+(d?'linear-gradient(135deg,'+o.color+'55,'+o.accent+'55)':'linear-gradient(135deg,'+o.color+','+o.accent+')')+';border:2px solid '+o.color+';border-radius:6px;padding:1px 4px;font-size:11px;opacity:'+(d?.5:1)+'">'+o.emoji+'</div>'}
  tags+='</div>';
  var fill=bowl.wrong?'#FFCDD2':done?'#C8E6C9':'#F0E4D0',stroke=bowl.wrong?'#E53935':done?'#4CAF50':'#C4A882';
  var app2='';for(var i=0;i<bowl.applied.length;i++){var f=bowl.applied[i];var p=[{x:55,y:45},{x:85,y:47},{x:70,y:40}][i]||{x:70,y:43};app2+='<text x="'+p.x+'" y="'+p.y+'" text-anchor="middle" font-size="16" dominant-baseline="central">'+f.emoji+'</text>'}
  var danger=bowl.progress>75&&!done&&!bowl.wrong?'<div class="dng" style="position:absolute;top:-5px;right:-5px;width:14px;height:14px;border-radius:50%;background:#E53935;color:white;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;animation:dangerPulse .35s ease infinite">!</div>':'';
  var w=document.createElement('div');w.className='bw';w.setAttribute('data-bid',bowl.id);
  w.style.cssText='position:absolute;left:'+bowl.progress+'%;top:50%;transform:translate(-50%,-85%);z-index:10;opacity:'+(done?(bowl.fadeOut?0:1):bowl.wrong?.6:1)+';pointer-events:'+(done||bowl.wrong?'none':'auto');
  w.innerHTML=tags+'<svg width="65" height="55" viewBox="0 0 140 120"><ellipse cx="70" cy="115" rx="40" ry="5" fill="rgba(0,0,0,.06)"/><path d="M24 60Q24 105 70 105Q116 105 116 60" fill="'+fill+'" stroke="'+stroke+'" stroke-width="2.5"/><path d="M28 60Q35 38 70 35Q105 38 112 60Z" fill="#FEFEFE"/><ellipse cx="55" cy="44" rx="10" ry="5" fill="#F8F8F8"/><ellipse cx="75" cy="42" rx="9" ry="5" fill="#FAFAFA"/><ellipse cx="65" cy="38" rx="8" ry="4" fill="white"/><ellipse cx="85" cy="48" rx="8" ry="4" fill="#F5F5F5"/><ellipse cx="45" cy="50" rx="9" ry="4" fill="#F8F8F8"/><ellipse cx="70" cy="60" rx="46" ry="10" fill="#F0EDE6" stroke="#D8D0C0" stroke-width="0.5"/><ellipse cx="55" cy="40" rx="5" ry="2.5" fill="rgba(255,255,255,.7)"/>'+app2+(done?'<text x="70" y="75" text-anchor="middle" font-size="20">✓</text>':'')+(bowl.wrong?'<text x="70" y="75" text-anchor="middle" font-size="20">✗</text>':'')+'</svg>'+danger;
  (function(bid){tap(w,function(){applyBowl(bid)})})(bowl.id);
  return w;
}
function updTime(){var el=document.getElementById('hT'),bar=document.getElementById('tB');if(!el)return;var c=G.time<=5?'#E53935':G.time<=10?'#FF9800':'#4CAF50';el.style.color=c;el.textContent=G.time+'s';if(G.time<=5)el.style.animation='heartBeat .5s ease infinite';if(bar){bar.style.width=(G.time/LT*100)+'%';bar.style.backgroundColor=c}}
function updScore(){var el=document.getElementById('hS');if(el){var cc=cfg(G.lv);el.textContent='🍚 '+G.score+'/'+cc.req}}
function updMiss(){var el=document.getElementById('hM');if(!el)return;var h='';for(var i=0;i<MM;i++)h+='<div style="width:12px;height:12px;border-radius:50%;background:'+(i<G.miss?'#E53935':'rgba(255,255,255,.08)')+';border:2px solid '+(i<G.miss?'#B71C1C':'rgba(255,255,255,.12)')+';font-size:7px;color:white;font-weight:900;display:flex;align-items:center;justify-content:center">'+(i<G.miss?'✕':'')+'</div>';el.innerHTML=h}
function updMsg(){var el=document.getElementById('hMsg');if(el)el.textContent=G.msg}
function updShima(){var el=document.getElementById('hE');if(el)el.innerHTML=shimaSVG(G.expr,48)}
function updSelDisp(){var el=document.getElementById('hSel');if(!el)return;if(G.sel.length>0){el.style.color='#FFE0B2';var h='手持ち: ';for(var i=0;i<G.sel.length;i++)h+='<span style="color:'+G.sel[i].color+'">'+G.sel[i].emoji+'</span> ';el.innerHTML=h+'→ ご飯をタップ！'}else{el.style.color='rgba(255,255,255,.25)';el.textContent='↓ ふりかけを選んでね ↓'}}
function updFGrid(){var btns=document.querySelectorAll('[data-fid]');btns.forEach(function(btn){var id=btn.dataset.fid,f=null;for(var i=0;i<F.length;i++)if(F[i].id===id){f=F[i];break}if(!f)return;var s=false;for(var i=0;i<G.sel.length;i++)if(G.sel[i].id===id){s=true;break}btn.style.background=s?'linear-gradient(135deg,'+f.color+'55,'+f.accent+'55)':'linear-gradient(135deg,'+f.color+','+f.accent+')';btn.style.border=s?'3px solid '+f.color:'2px solid rgba(255,255,255,.08)';btn.style.opacity=s?.5:1;btn.style.transform=s?'scale(.94)':'scale(1)';var ck=btn.querySelector('.ck');if(ck)ck.remove();if(s){var d=document.createElement('div');d.className='ck';d.style.cssText='position:absolute;top:-3px;right:-3px;width:13px;height:13px;border-radius:50%;background:#FFD54F;color:#3E2723;font-size:8px;font-weight:900;display:flex;align-items:center;justify-content:center';d.textContent='✓';btn.appendChild(d)}})}

function rCleared(){
  app.innerHTML='<div class="scr" style="justify-content:center;gap:14px;background:linear-gradient(170deg,#2D1B0E,#3E2415 40%,#4A2C1A)"><div style="font-size:48px;animation:starSpin 1s ease">⭐</div>'+shimaSVG('happy',100)+'<div style="background:rgba(255,255,255,.06);border-radius:20px;padding:20px 24px;text-align:center;border:1px solid rgba(76,175,80,.2);max-width:320px;width:100%"><p style="font-size:14px;color:#A5D6A7;margin:0 0 4px;font-weight:700">LEVEL '+G.lv+' CLEAR!</p><p style="margin:8px 0 0;font-size:14px;color:#FFE0B2;font-weight:600">'+G.msg+'</p></div>'+(G.lv<ML?'<button class="bm" id="nextBtn" style="animation:pulse 2s ease infinite">次のレベルへ！</button>':'')+'<button class="bs" id="selBtn">レベル選択へ</button></div>';
  if(document.getElementById('nextBtn'))tap(document.getElementById('nextBtn'),function(){startLv(G.lv+1)});
  tap(document.getElementById('selBtn'),function(){show('levelSelect')});
}

function rFailed(){
  var cc=cfg(G.lv);
  app.innerHTML='<div class="scr" style="justify-content:center;gap:14px;background:linear-gradient(170deg,#2D1B0E,#3E2415 40%,#4A2C1A)">'+shimaSVG('sad',100)+'<div style="background:rgba(255,255,255,.06);border-radius:20px;padding:20px 24px;text-align:center;border:1px solid rgba(229,57,53,.2);max-width:320px;width:100%"><p style="font-size:14px;color:#EF9A9A;margin:0 0 4px;font-weight:700">LEVEL '+G.lv+' FAILED</p><p style="margin:8px 0 0;font-size:13px;color:#FFE0B2;font-weight:600">'+(G.miss>=MM?'ミス'+MM+'回…💦':'時間切れ…⏱️')+'</p><p style="margin:4px 0 0;font-size:12px;color:#BCAAA4">完成: '+G.score+'/'+cc.req+'</p></div><button class="bm" id="retryBtn" style="animation:pulse 2s ease infinite">もういちど！</button><button class="bs" id="selBtn">レベル選択へ</button></div>';
  tap(document.getElementById('retryBtn'),function(){startLv(G.lv)});
  tap(document.getElementById('selBtn'),function(){show('levelSelect')});
}

function rAllClear(){
  var cols=["#FFD54F","#FF8F00","#E53935","#4CAF50","#2196F3","#E040FB","#FF6F00","#00BCD4"];
  var conf='';for(var i=0;i<30;i++){var sz=6+Math.random()*8;conf+='<div style="position:absolute;left:'+Math.random()*100+'%;top:-20px;width:'+sz+'px;height:'+sz*(0.6+Math.random()*.8)+'px;background:'+cols[i%8]+';border-radius:'+(Math.random()>.5?'50%':'2px')+';animation:confettiFall '+(2.5+Math.random()*2)+'s linear '+Math.random()*2+'s infinite;opacity:.8;z-index:0"></div>'}
  var emojis='';for(var i=0;i<F.length;i++)emojis+='<span style="font-size:22px;animation:popIn .3s ease '+(1+i*.1)+'s both">'+F[i].emoji+'</span>';
  app.innerHTML='<div class="scr" style="justify-content:center;gap:10px;position:relative;overflow:hidden;background:linear-gradient(170deg,#2D1B0E,#3E2415 40%,#4A2C1A)">'+conf+'<div style="font-size:48px;animation:starSpin 2s ease infinite;z-index:1">🏆</div><div style="font-size:36px;font-weight:900;background:linear-gradient(135deg,#FFD54F,#FF8F00,#E65100);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:omedetouPop .8s ease both,glowPulse 2s ease-in-out infinite;z-index:1">おめでとう！</div><div style="animation:shimaDance 1.2s ease-in-out infinite;z-index:1">'+shimaSVG('happy',130)+'</div><div style="background:rgba(255,255,255,.1);border-radius:16px;padding:12px 20px;text-align:center;border:1px solid rgba(255,213,79,.2);max-width:300px;width:100%;z-index:1;animation:popIn .5s ease .5s both"><p style="font-size:14px;font-weight:700;color:#FFE0B2;margin:0;line-height:1.8">🎊 全20レベルクリア！🎊<br>キミは伝説のふりかけ職人だ！<br>シマエナガも大喜び！🐦✨</p></div><div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;max-width:280px;z-index:1;animation:popIn .5s ease .8s both">'+emojis+'</div><button class="bm" id="selBtn" style="z-index:1;animation:popIn .5s ease 1.5s both">レベル選択へ</button></div>';
  tap(document.getElementById('selBtn'),function(){show('levelSelect')});
}

show('title');
</script>
