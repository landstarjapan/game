<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ふりかけパラパラ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:linear-gradient(170deg,#2D1B0E,#3E2415 40%,#4A2C1A);color:#fff}
#app{width:100%;height:100%;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;align-items:center;width:100%;height:100%;position:absolute;top:0;left:0}
.screen.active{display:flex}
button{font-family:'Zen Maru Gothic',sans-serif;cursor:pointer;border:none;outline:none;-webkit-appearance:none}
.btn-main{background:linear-gradient(135deg,#FF8F00,#E65100);color:#fff;border-radius:50px;padding:14px 44px;font-size:18px;font-weight:900;box-shadow:0 6px 24px rgba(230,81,0,0.5),inset 0 1px 0 rgba(255,255,255,0.3)}
.btn-sub{background:transparent;border:2px solid rgba(255,255,255,0.15);border-radius:50px;padding:10px 32px;font-size:13px;font-weight:700;color:#BCAAA4}
@keyframes shimaIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes shimaHappy{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-12px) scale(1.08)}60%{transform:translateY(2px) scale(.97)}100%{transform:translateY(0) scale(1)}}
@keyframes shimaPanic{0%,100%{transform:translateX(0) rotate(0)}25%{transform:translateX(-4px) rotate(-3deg)}75%{transform:translateX(4px) rotate(3deg)}}
@keyframes conveyorMove{0%{background-position:0 0}100%{background-position:40px 0}}
@keyframes dangerPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}
@keyframes screenShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}15%{transform:scale(1.15)}30%{transform:scale(1)}45%{transform:scale(1.1)}}
@keyframes titleFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-10px) rotate(1deg)}}
@keyframes starSpin{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(1.2)}100%{transform:rotate(360deg) scale(1)}}
@keyframes shimaDance{0%{transform:translateY(0) rotate(0) scale(1)}10%{transform:translateY(-20px) rotate(-8deg) scale(1.1)}20%{transform:translateY(0) rotate(8deg)}30%{transform:translateY(-15px) rotate(-5deg) scale(1.05)}40%{transform:translateY(0) rotate(5deg)}50%{transform:translateY(-25px) rotate(-10deg) scale(1.15)}60%{transform:translateY(0) rotate(10deg)}70%{transform:translateY(-10px) rotate(-3deg)}80%{transform:translateY(0) rotate(3deg)}90%{transform:translateY(-18px) rotate(-6deg) scale(1.1)}100%{transform:translateY(0) rotate(0)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:.3}}
@keyframes omedetouPop{0%{transform:scale(0) rotate(-10deg);opacity:0}50%{transform:scale(1.2) rotate(3deg);opacity:1}70%{transform:scale(.95) rotate(-1deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 20px rgba(255,213,79,.3),0 0 40px rgba(255,152,0,.2)}50%{text-shadow:0 0 30px rgba(255,213,79,.6),0 0 60px rgba(255,152,0,.4)}}
.conveyor-belt{position:relative;width:100%;flex-shrink:0}
.belt-track{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);background:linear-gradient(180deg,#5D4037,#4E342E,#3E2723);border-radius:3px;border:2px solid #6D4C41;overflow:hidden}
.belt-pattern{position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0px,rgba(255,255,255,.04) 2px,transparent 2px,transparent 40px);animation:conveyorMove 1.5s linear infinite}
.belt-roller{position:absolute;top:50%;transform:translateY(-50%);border-radius:5px;background:#795548;border:2px solid #8D6E63}
.bowl-wrap{position:absolute;top:50%;transform:translate(-50%,-50%);z-index:10;transition:opacity .3s}
.order-tags{display:flex;gap:2px;justify-content:center;margin-bottom:3px}
.order-tag{border-radius:7px;padding:1px 5px;font-size:12px;transition:all .2s}
.furikake-btn{border-radius:12px;padding:8px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;transition:all .12s cubic-bezier(.34,1.56,.64,1)}
.furikake-btn .check{position:absolute;top:-3px;right:-3px;width:14px;height:14px;border-radius:50%;background:#FFD54F;color:#3E2723;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center}
.level-btn{border-radius:12px;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════
// FURIKAKE PARAPARA - HTML VERSION
// ═══════════════════════════════════════

const FURIKAKE=[
  {id:"noritama",name:"のりたま",color:"#E8C840",accent:"#4A7C3F",emoji:"🥚"},
  {id:"sake",name:"さけ",color:"#E8736B",accent:"#C94F47",emoji:"🐟"},
  {id:"ume",name:"梅しそ",color:"#D4508B",accent:"#A23B6A",emoji:"🌸"},
  {id:"wasabi",name:"わさび",color:"#6DAD3C",accent:"#4A8520",emoji:"🟢"},
  {id:"mentai",name:"明太子",color:"#E53935",accent:"#B71C1C",emoji:"🌶️"},
  {id:"katsuo",name:"かつお",color:"#8D6E63",accent:"#5D4037",emoji:"🐱"},
  {id:"tamago",name:"たまご",color:"#FFD54F",accent:"#FF8F00",emoji:"🍳"},
  {id:"kombu",name:"こんぶ",color:"#2E7D32",accent:"#1B5E20",emoji:"🌿"},
];
const LEVEL_TIME=20, MAX_LEVEL=20, MAX_MISSES=3;
const LEVELS=[
  [1,30,1,3],[1,15,1,3],[1,10,1,3],[1,5,1,4],
  [1,20,2,3],[1,10,2,4],[1,15,3,4],[1,10,3,4],
  [2,15,1,4],[2,10,1,5],[2,5,1,5],[2,20,2,5],[2,10,2,5],
  [3,15,1,5],[3,7,1,5],[3,15,2,5],[3,15,3,6],[3,10,2,6],[3,15,3,6],[3,10,3,6],
];
const lvCfg=l=>{const[c,s,t,r]=LEVELS[Math.max(0,Math.min(l-1,19))];return{conveyors:c,speed:s,toppings:t,required:r}};
const rndFuri=n=>[...FURIKAKE].sort(()=>Math.random()-.5).slice(0,n);

// ─── Audio ───
let audioCtx=null,audioUnlocked=false;
const getAC=()=>{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext);return audioCtx};
const unlockAudio=()=>{const c=getAC();if(!audioUnlocked){const b=c.createBuffer(1,1,c.sampleRate),s=c.createBufferSource();s.buffer=b;s.connect(c.destination);s.start(0);audioUnlocked=true}if(c.state==="suspended")c.resume();return c};
document.addEventListener("touchstart",()=>unlockAudio(),{once:true});
document.addEventListener("click",()=>unlockAudio(),{once:true});

const playShu=()=>{try{const c=unlockAudio(),d=.12,n=c.sampleRate*d|0,b=c.createBuffer(1,n,c.sampleRate),a=b.getChannelData(0);for(let i=0;i<n;i++){const t=i/n;a[i]=(Math.random()*2-1)*(1-t)*(1-t)*.3}const s=c.createBufferSource();s.buffer=b;const h=c.createBiquadFilter();h.type="highpass";h.frequency.value=3000;const p=c.createBiquadFilter();p.type="bandpass";p.frequency.value=5000;p.Q.value=1.5;const g=c.createGain();g.gain.setValueAtTime(.4,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);s.connect(h).connect(p).connect(g).connect(c.destination);s.start();s.stop(c.currentTime+d)}catch(e){}};
const playSa=()=>{try{const c=unlockAudio(),d=.22,n=c.sampleRate*d|0,b=c.createBuffer(1,n,c.sampleRate),a=b.getChannelData(0);for(let i=0;i<n;i++){const t=i/n;a[i]=(Math.random()*2-1)*Math.sin(t*Math.PI)*(1-t*.3)*.6}const s=c.createBufferSource();s.buffer=b;const p=c.createBiquadFilter();p.type="bandpass";p.frequency.value=3500;p.Q.value=.6;const g=c.createGain();g.gain.setValueAtTime(.9,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);s.connect(p).connect(g).connect(c.destination);s.start();s.stop(c.currentTime+d)}catch(e){}};
const playMiss=()=>{try{const c=unlockAudio(),o=c.createOscillator();o.type="square";o.frequency.setValueAtTime(200,c.currentTime);o.frequency.linearRampToValueAtTime(120,c.currentTime+.15);const g=c.createGain();g.gain.setValueAtTime(.15,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.15);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+.15)}catch(e){}};
const playClear=()=>{try{const c=unlockAudio(),now=c.currentTime;[[523,0,.4],[659,.15,.4],[784,.3,.4],[1047,.5,.9]].forEach(([f,t,d])=>{const o=c.createOscillator();o.type="triangle";o.frequency.value=f;const g=c.createGain();const s=now+t;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(.25,s+.03);g.gain.exponentialRampToValueAtTime(.001,s+d);o.connect(g).connect(c.destination);o.start(s);o.stop(s+d+.01);const o2=c.createOscillator();o2.type="sine";o2.frequency.value=f*2;const g2=c.createGain();g2.gain.setValueAtTime(0,s+.02);g2.gain.linearRampToValueAtTime(.1,s+.05);g2.gain.exponentialRampToValueAtTime(.001,s+d*.7);o2.connect(g2).connect(c.destination);o2.start(s+.02);o2.stop(s+d+.01)})}catch(e){}};
const playFail=()=>{try{const c=unlockAudio(),now=c.currentTime;[[330,0],[294,.3],[262,.6]].forEach(([f,t])=>{const o=c.createOscillator();o.type="triangle";o.frequency.value=f;const lfo=c.createOscillator();lfo.frequency.value=5;const lg=c.createGain();lg.gain.value=3;lfo.connect(lg).connect(o.frequency);const g=c.createGain();const s=now+t;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(.2,s+.03);g.gain.exponentialRampToValueAtTime(.001,s+.35);o.connect(g).connect(c.destination);o.start(s);o.stop(s+.36);lfo.start(s);lfo.stop(s+.36)})}catch(e){}};
const playCelebration=()=>{try{const c=unlockAudio(),now=c.currentTime,m=c.createGain();m.gain.value=.15;m.connect(c.destination);[[523,0,.25],[659,.2,.25],[784,.4,.3],[1047,.7,.5],[1175,1,.3],[1319,1.2,.3],[1568,1.5,.8],[2093,2,1.2]].forEach(([f,t,d])=>{const o=c.createOscillator();o.type="triangle";o.frequency.value=f;const g=c.createGain();const s=now+t;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(.4,s+.04);g.gain.setValueAtTime(.35,s+d*.6);g.gain.exponentialRampToValueAtTime(.001,s+d);o.connect(g).connect(m);o.start(s);o.stop(s+d+.02);const o2=c.createOscillator();o2.type="sine";o2.frequency.value=f*2;const g2=c.createGain();g2.gain.setValueAtTime(0,s+.02);g2.gain.linearRampToValueAtTime(.12,s+.06);g2.gain.exponentialRampToValueAtTime(.001,s+d*.8);o2.connect(g2).connect(m);o2.start(s+.02);o2.stop(s+d+.02)});[131,165,196,262].forEach((f,i)=>{const o=c.createOscillator();o.type="sine";o.frequency.value=f;const g=c.createGain();const s=now+i*.6;g.gain.setValueAtTime(.3,s);g.gain.exponentialRampToValueAtTime(.001,s+.5);o.connect(g).connect(m);o.start(s);o.stop(s+.55)})}catch(e){}};

let bgmN=null;
const startBGM=()=>{try{stopBGM();const c=unlockAudio(),mg=c.createGain();mg.gain.value=.08;mg.connect(c.destination);const bpm=140,bl=60/bpm,ll=bl*16;const mel=[523,587,659,784,880,784,659,587,523,659,784,880,784,659,523,587,880,784,659,523,587,659,784,659,523,587,659,784,880,1047,880,784];const bas=[131,131,165,165,196,196,165,165,131,131,196,196,220,220,196,196];const now=c.currentTime+.05;const sched=(st)=>{mel.forEach((f,i)=>{const o=c.createOscillator();o.type="triangle";o.frequency.value=f;const g=c.createGain();const t=st+i*(ll/mel.length),d=ll/mel.length*.7;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.3,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g).connect(mg);o.start(t);o.stop(t+d+.01)});bas.forEach((f,i)=>{const o=c.createOscillator();o.type="sine";o.frequency.value=f;const g=c.createGain();const t=st+i*(ll/bas.length),d=ll/bas.length*.5;g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g).connect(mg);o.start(t);o.stop(t+d+.01)});for(let i=0;i<32;i++){const n=c.sampleRate*.03|0,b=c.createBuffer(1,n,c.sampleRate),a=b.getChannelData(0);for(let j=0;j<n;j++)a[j]=(Math.random()*2-1)*(1-j/n);const s=c.createBufferSource();s.buffer=b;const h=c.createBiquadFilter();h.type="highpass";h.frequency.value=8000;const g=c.createGain();g.gain.value=i%2===0?.15:.08;const t=st+i*(ll/32);s.connect(h).connect(g).connect(mg);s.start(t);s.stop(t+.03)}};for(let l=0;l<4;l++)sched(now+l*ll);bgmN={mg,c,st:now,ll,sched,nl:4};const ahead=()=>{if(!bgmN)return;const nd=Math.ceil((c.currentTime-bgmN.st+ll*2)/ll);while(bgmN.nl<nd){sched(bgmN.st+bgmN.nl*ll);bgmN.nl++}bgmN.tid=setTimeout(ahead,ll*500)};bgmN.tid=setTimeout(ahead,ll*2000)}catch(e){}};
const stopBGM=()=>{try{if(bgmN){clearTimeout(bgmN.tid);bgmN.mg.gain.exponentialRampToValueAtTime(.001,bgmN.c.currentTime+.3);setTimeout(()=>{try{bgmN.mg.disconnect()}catch(e){}},500);bgmN=null}}catch(e){}};

// ─── Shima-enaga SVG ───
const shimaSVG=(expr,size)=>`<svg width="${size}" height="${size}" viewBox="0 0 120 120" style="filter:drop-shadow(0 3px 6px rgba(0,0,0,.12));animation:${expr==='panic'?'shimaPanic .3s ease infinite':expr==='happy'?'shimaHappy .5s ease':'shimaIdle 2.5s ease-in-out infinite'}">
<ellipse cx="60" cy="70" rx="36" ry="34" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>
<circle cx="60" cy="38" r="27" fill="#FEFEFE" stroke="#E8E8E8" stroke-width="1"/>
<ellipse cx="60" cy="18" rx="15" ry="9" fill="#FEFEFE" stroke="#E8E8E8" stroke-width=".5"/>
<ellipse cx="50" cy="20" rx="7" ry="5" fill="white"/><ellipse cx="70" cy="20" rx="7" ry="5" fill="white"/>
<path d="M 38 35 Q 48 38 52 36" stroke="#1A1A1A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
<path d="M 68 36 Q 72 38 82 35" stroke="#1A1A1A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
${expr==='happy'?'<path d="M 46 35 Q 49 31 52 35" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M 68 35 Q 71 31 74 35" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>':expr==='panic'?'<circle cx="49" cy="33" r="4" fill="#1A1A1A"/><circle cx="71" cy="33" r="4" fill="#1A1A1A"/><circle cx="50.5" cy="31.5" r="1.5" fill="white"/><circle cx="72.5" cy="31.5" r="1.5" fill="white"/><ellipse cx="60" cy="48" rx="4" ry="3" fill="#1A1A1A"/>':expr==='sad'?'<path d="M 46 36 Q 49 34 52 36" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M 68 36 Q 71 34 74 36" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>':'<circle cx="49" cy="35" r="3" fill="#1A1A1A"/><circle cx="71" cy="35" r="3" fill="#1A1A1A"/><circle cx="50" cy="34" r="1" fill="white"/><circle cx="72" cy="34" r="1" fill="white"/>'}
<ellipse cx="60" cy="42" rx="3" ry="2" fill="#FFB74D"/>
<ellipse cx="42" cy="40" rx="5" ry="3" fill="#FFCDD2" opacity=".5"/><ellipse cx="78" cy="40" rx="5" ry="3" fill="#FFCDD2" opacity=".5"/>
${expr==='panic'?'<line x1="38" y1="18" x2="34" y2="12" stroke="#E53935" stroke-width="2" stroke-linecap="round"/><line x1="82" y1="18" x2="86" y2="12" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>':''}
<path d="M 88 77 Q 108 62 113 47" stroke="#E0E0E0" stroke-width="3" fill="none" stroke-linecap="round"/>
<path d="M 48 100 L 45 110 M 48 100 L 48 110 M 48 100 L 51 110" stroke="#FFB74D" stroke-width="2" fill="none" stroke-linecap="round"/>
<path d="M 72 100 L 69 110 M 72 100 L 72 110 M 72 100 L 75 110" stroke="#FFB74D" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>`;

// ─── Game State ───
let G={screen:"title",level:1,cleared:new Set(),timeLeft:LEVEL_TIME,score:0,missed:0,selected:[],bowls:[],msg:"",shimaExpr:"normal",gameActive:false,nextId:0,lastFrame:null,spawnClocks:[0,0,0]};

const $=id=>document.getElementById(id);
const app=document.getElementById("app");

// ─── Render Helpers ───
const h=(tag,attrs,children)=>{const el=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else el.setAttribute(k,v)});if(children!=null){if(Array.isArray(children))children.forEach(c=>{if(c)el.appendChild(typeof c==='string'?document.createTextNode(c):c)});else if(typeof children==='string')el.innerHTML=children;else el.appendChild(children)}return el};

// ─── Screens ───
function showScreen(name){G.screen=name;app.innerHTML='';if(name==='title')renderTitle();else if(name==='levelSelect')renderLevelSelect();else if(name==='playing')renderPlaying();else if(name==='cleared')renderCleared();else if(name==='failed')renderFailed();else if(name==='allClear')renderAllClear()}

function renderTitle(){
  const d=h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:'20px',gap:'14px'}});
  d.innerHTML=`
    <div style="animation:titleFloat 3s ease-in-out infinite">${shimaSVG('happy',130)}</div>
    <div style="text-align:center;z-index:1">
      <h1 style="font-family:'Zen Maru Gothic',sans-serif;font-size:36px;font-weight:900;color:#FFD54F;margin:0;line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,.4)">ふりかけ<br><span style="font-size:42px;color:#FF8F00">パラパラ</span></h1>
      <p style="color:#BCAAA4;font-size:13px;font-weight:600;margin-top:6px;letter-spacing:.15em">〜 シマエナガのふりかけ屋さん 〜</p>
    </div>
    <div style="background:rgba(255,255,255,.06);border-radius:18px;padding:16px 22px;max-width:320px;text-align:center;border:1px solid rgba(255,213,79,.15)">
      <p style="margin:0;font-size:13px;color:#D7CCC8;line-height:2;font-weight:500">
        🍚 全${MAX_LEVEL}レベルをクリアしよう！<br>📦 ふりかけを選んでご飯にのせてね<br>⏱ 各レベル <strong style="color:#FFD54F">${LEVEL_TIME}秒</strong><br>💀 <strong style="color:#EF9A9A">${MAX_MISSES}回</strong>ミスで失敗<br>🔥 レベルが上がると難しくなるよ！
      </p>
    </div>`;
  const btn=h('button',{class:'btn-main',style:{animation:'pulse 2s ease-in-out infinite',marginTop:'8px',fontSize:'20px',padding:'16px 52px'},onClick:()=>{playShu();showScreen('levelSelect')}},'はじめる！');
  d.appendChild(btn);
  app.appendChild(d);
}

function renderLevelSelect(){
  const d=h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',minHeight:'100vh',padding:'20px 16px',gap:'12px'}});
  d.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">${shimaSVG('normal',50)}<h2 style="font-family:'Zen Maru Gothic',sans-serif;font-size:22px;font-weight:900;color:#FFD54F;margin:0">レベルせんたく</h2></div>`;
  const grid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'8px',maxWidth:'360px',width:'100%'}});
  for(let i=1;i<=MAX_LEVEL;i++){
    const lv=i,cfg=lvCfg(lv),cl=G.cleared.has(lv),play=lv===1||G.cleared.has(lv-1);
    const btn=h('button',{class:'level-btn',style:{background:cl?'linear-gradient(135deg,#4CAF50,#2E7D32)':play?'linear-gradient(135deg,#FF8F00,#E65100)':'rgba(255,255,255,.05)',border:cl?'2px solid #66BB6A':play?'2px solid #FFB74D':'2px solid rgba(255,255,255,.08)',opacity:play?1:.35,cursor:play?'pointer':'not-allowed'},onClick:()=>{if(play){playShu();startLevel(lv)}}});
    btn.innerHTML=`<span style="font-size:16px;font-weight:900;color:white">${cl?'⭐':lv}</span><div style="display:flex;gap:1px">${Array.from({length:cfg.conveyors},()=>'<div style="width:8px;height:3px;border-radius:1px;background:rgba(255,255,255,'+(play?.5:.2)+')"></div>').join('')}</div>`;
    grid.appendChild(btn);
  }
  d.appendChild(grid);
  d.innerHTML+=`<div style="background:rgba(255,255,255,.05);border-radius:14px;padding:12px 18px;max-width:360px;width:100%;margin-top:4px"><p style="margin:0;font-size:11px;color:#BCAAA4;line-height:1.8;font-weight:500"><span style="color:#FFD54F">━</span> ベルト数（難易度で増加、最大3本）<br>各レベル ${LEVEL_TIME}秒以内に規定数クリアで合格！</p></div>`;
  const back=h('button',{class:'btn-sub',onClick:()=>showScreen('title')},'もどる');
  d.appendChild(back);
  app.appendChild(d);
}

// ─── Playing ───
let frameId=null,timerIv=null;
function startLevel(lv){
  G.level=lv;G.timeLeft=LEVEL_TIME;G.score=0;G.missed=0;G.selected=[];G.msg=`レベル ${lv} スタート！`;G.shimaExpr='happy';G.nextId=0;G.lastFrame=null;G.spawnClocks=[0,1.5,.8];G.gameActive=true;
  const cfg=lvCfg(lv),offsets=[0,35,18];
  G.bowls=[];
  for(let i=0;i<cfg.conveyors;i++){
    const o=offsets[i]||0;
    G.bowls.push({id:++G.nextId,lane:i,order:rndFuri(cfg.toppings),applied:[],progress:5+o,wrong:false,fadeOut:false});
    G.bowls.push({id:++G.nextId,lane:i,order:rndFuri(cfg.toppings),applied:[],progress:-15+o*.3,wrong:false,fadeOut:false});
  }
  startBGM();showScreen('playing');
}

function renderPlaying(){
  const cfg=lvCfg(G.level);
  const wrap=h('div',{style:{display:'flex',flexDirection:'column',height:'100vh',padding:'6px 10px',gap:'4px',boxSizing:'border-box'}});
  // HUD
  wrap.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:0 2px">
      <div style="display:flex;align-items:center;gap:6px">
        <span id="hud-lv" style="font-size:14px;font-weight:900;color:#FFD54F;font-family:'Zen Maru Gothic',sans-serif;background:rgba(255,213,79,.15);border-radius:8px;padding:2px 10px">Lv.${G.level}</span>
        <span id="hud-score" style="font-size:14px;font-weight:700;color:#A5D6A7">🍚 ${G.score}/${cfg.required}</span>
      </div>
      <div id="hud-timer" style="font-size:22px;font-weight:900;color:#4CAF50;font-family:'Zen Maru Gothic',sans-serif">${G.timeLeft}s</div>
    </div>
    <div style="width:100%;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden"><div id="timer-bar" style="height:100%;width:100%;background:#4CAF50;border-radius:3px;transition:width 1s linear"></div></div>
    <div id="miss-dots" style="display:flex;gap:3px;justify-content:center"></div>
    <div style="display:flex;align-items:flex-end;gap:5px;padding:0 2px">
      <div id="shima-wrap" style="flex-shrink:0">${shimaSVG(G.shimaExpr,52)}</div>
      <div id="msg-bubble" style="background:rgba(255,255,255,.08);border-radius:10px 10px 10px 4px;padding:5px 10px;font-size:11px;font-weight:600;color:#FFE0B2;flex:1;border:1px solid rgba(255,255,255,.06);line-height:1.4">${G.msg}</div>
    </div>`;
  // Conveyors
  const cArea=h('div',{id:'conveyor-area',style:{display:'flex',flexDirection:'column',gap:'8px',flex:'1',justifyContent:'center',minHeight:'0'}});
  for(let i=0;i<cfg.conveyors;i++){
    const laneH=cfg.conveyors===1?120:cfg.conveyors===2?105:90;
    const trackH=cfg.conveyors===1?30:cfg.conveyors===2?26:22;
    const rollerH=cfg.conveyors===1?36:28;
    const lane=h('div',{class:'conveyor-belt','data-lane':i,style:{height:laneH+'px'}});
    lane.innerHTML=`<div class="belt-track" style="height:${trackH}px"><div class="belt-pattern"></div></div><div class="belt-roller" style="left:-3px;width:10px;height:${rollerH}px"></div><div class="belt-roller" style="right:-3px;width:10px;height:${rollerH}px"></div><div style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#E53935;font-size:14px;font-weight:900;opacity:.4">▸▸</div>`;
    cArea.appendChild(lane);
  }
  wrap.appendChild(cArea);
  // Selected display
  wrap.innerHTML+=`<div id="selected-display" style="text-align:center;font-size:11px;font-weight:700;color:rgba(255,255,255,.25);min-height:16px;flex-shrink:0">↓ ふりかけを選んでね ↓</div>`;
  // Furikake grid
  const grid=h('div',{id:'furi-grid',style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'6px',padding:'0 2px',paddingBottom:'10px',flexShrink:'0'}});
  FURIKAKE.forEach(f=>{
    const btn=h('button',{class:'furikake-btn','data-id':f.id,style:{background:`linear-gradient(135deg,${f.color},${f.accent})`,border:'2px solid rgba(255,255,255,.08)'},onClick:()=>{playShu();toggleSelect(f)}});
    btn.innerHTML=`<span style="font-size:18px">${f.emoji}</span><span style="font-size:9px;font-weight:700;color:white;text-shadow:0 1px 3px rgba(0,0,0,.5)">${f.name}</span>`;
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);
  app.appendChild(wrap);
  updateMissDots();updateBowlsDOM();
  // Start loop
  G.lastFrame=null;
  timerIv=setInterval(()=>{
    G.timeLeft--;updateTimerHUD();
    if(G.timeLeft<=0){clearInterval(timerIv);endLevel('fail')}
  },1000);
  const loop=ts=>{
    if(!G.gameActive)return;
    if(!G.lastFrame)G.lastFrame=ts;
    const dt=Math.min((ts-G.lastFrame)/1000,.1);G.lastFrame=ts;
    // Move bowls
    G.bowls.forEach(b=>{b.progress+=100/cfg.speed*dt});
    // Off-screen check
    const gone=G.bowls.filter(b=>b.progress>108);
    let missCount=0;
    gone.forEach(b=>{const rem=b.order.map(o=>o.id);b.applied.forEach(a=>{const ri=rem.indexOf(a.id);if(ri!==-1)rem.splice(ri,1)});if(rem.length>0&&!b.wrong)missCount++});
    if(missCount>0){G.missed+=missCount;G.shimaExpr='sad';G.msg='流れちゃった…💦';if(G.missed>=MAX_MISSES){G.bowls=G.bowls.filter(b=>b.progress<=108);updateBowlsDOM();endLevel('fail');return}setTimeout(()=>{G.shimaExpr='normal';updateShima()},400)}
    G.bowls=G.bowls.filter(b=>b.progress<=108);
    // Spawn
    for(let lane=0;lane<cfg.conveyors;lane++){
      G.spawnClocks[lane]+=dt;
      const perLane=Math.ceil((cfg.required+2)/cfg.conveyors);
      const si=Math.min(cfg.speed*.3,LEVEL_TIME/(perLane+1));
      const lb=G.bowls.filter(b=>b.lane===lane&&!b.wrong&&!b.fadeOut);
      if(G.spawnClocks[lane]>=si&&lb.length<4){const last=lb[lb.length-1];if(!last||last.progress>15){G.spawnClocks[lane]=0;G.bowls.push({id:++G.nextId,lane,order:rndFuri(cfg.toppings),applied:[],progress:-10,wrong:false,fadeOut:false})}}
    }
    updateBowlsDOM();updateMissDots();updateMsg();updateSelectedDisplay();
    frameId=requestAnimationFrame(loop);
  };
  frameId=requestAnimationFrame(loop);
}

function toggleSelect(f){
  const i=G.selected.findIndex(s=>s.id===f.id);
  if(i>=0)G.selected.splice(i,1);else G.selected.push(f);
  updateFuriGrid();updateSelectedDisplay();
}

function applyToBowl(bowlId){
  if(!G.selected.length)return;
  const bi=G.bowls.findIndex(b=>b.id===bowlId);if(bi===-1)return;
  const bowl=G.bowls[bi];if(bowl.wrong||bowl.fadeOut)return;
  const rem=bowl.order.map(o=>o.id);bowl.applied.forEach(a=>{const ri=rem.indexOf(a.id);if(ri!==-1)rem.splice(ri,1)});
  const sel=G.selected.map(s=>s.id),chk=[...rem];
  let ok=sel.length===chk.length;
  if(ok)for(const s of sel){const ri=chk.indexOf(s);if(ri===-1){ok=false;break}chk.splice(ri,1)}
  if(ok){
    playSa();bowl.applied.push(...G.selected);bowl.fadeOut=true;G.score++;G.selected=[];G.shimaExpr='happy';
    const cfg=lvCfg(G.level);
    if(G.score>=cfg.required){setTimeout(()=>endLevel('clear'),300)}
    else{const ms=["ナイス！🎵","いいね！✨","おいしそう！🤤","すばらしい！💫"];G.msg=`${ms[Math.random()*ms.length|0]} (${G.score}/${cfg.required})`}
    setTimeout(()=>{G.shimaExpr='normal';G.bowls=G.bowls.filter(b=>b.id!==bowlId);updateBowlsDOM();updateShima()},350);
  }else{
    playMiss();bowl.wrong=true;G.selected=[];G.missed++;G.shimaExpr='panic';G.msg='ちがう！注文を確認して！😱';
    app.style.animation='screenShake .3s ease';setTimeout(()=>app.style.animation='',300);
    setTimeout(()=>{G.shimaExpr='normal';G.bowls=G.bowls.filter(b=>b.id!==bowlId);updateBowlsDOM();updateShima()},500);
    if(G.missed>=MAX_MISSES)setTimeout(()=>endLevel('fail'),400);
  }
  updateFuriGrid();updateSelectedDisplay();updateScoreHUD();updateMissDots();updateMsg();
}

function endLevel(result){
  G.gameActive=false;stopBGM();clearInterval(timerIv);cancelAnimationFrame(frameId);
  if(result==='clear'){
    G.cleared.add(G.level);
    if(G.level>=MAX_LEVEL){playCelebration();showScreen('allClear')}
    else{playClear();showScreen('cleared')}
  }else{playFail();showScreen('failed')}
}

// ─── DOM Update Helpers ───
function updateBowlsDOM(){
  const cfg=lvCfg(G.level);
  for(let lane=0;lane<cfg.conveyors;lane++){
    const el=document.querySelector(`[data-lane="${lane}"]`);if(!el)continue;
    el.querySelectorAll('.bowl-wrap').forEach(b=>b.remove());
    G.bowls.filter(b=>b.lane===lane).forEach(bowl=>{
      const rem=bowl.order.map(o=>o.id);bowl.applied.forEach(a=>{const ri=rem.indexOf(a.id);if(ri!==-1)rem.splice(ri,1)});
      const done=rem.length===0;
      const w=h('div',{class:'bowl-wrap',style:{left:bowl.progress+'%',opacity:done?(bowl.fadeOut?0:1):bowl.wrong?.6:1,pointerEvents:done||bowl.wrong?'none':'auto',cursor:G.selected.length&&!done&&!bowl.wrong?'pointer':'default'},onClick:()=>applyToBowl(bowl.id)});
      let tags='<div class="order-tags">';
      bowl.order.forEach((o,i)=>{
        const nc=bowl.order.filter((x,j)=>j<=i&&x.id===o.id).length;
        const ac=bowl.applied.filter(a=>a.id===o.id).length;
        const d=ac>=nc;
        tags+=`<div class="order-tag" style="background:${d?`linear-gradient(135deg,${o.color}55,${o.accent}55)`:`linear-gradient(135deg,${o.color},${o.accent})`};border:2px solid ${o.color};opacity:${d?.5:1};box-shadow:${d?'none':`0 0 6px ${o.color}50`}">${o.emoji}</div>`;
      });
      tags+='</div>';
      const fill=bowl.wrong?'#FFCDD2':done?'#C8E6C9':'#F0E4D0';
      const stroke=bowl.wrong?'#E53935':done?'#4CAF50':'#C4A882';
      let applied='';
      bowl.applied.forEach((f,fi)=>{const pos=[{x:50,y:57},{x:90,y:57},{x:70,y:50}][fi]||{x:70,y:54};applied+=`<text x="${pos.x}" y="${pos.y}" text-anchor="middle" font-size="18" dominant-baseline="central">${f.emoji}</text>`});
      let danger='';
      if(bowl.progress>75&&!done&&!bowl.wrong)danger='<div style="position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:#E53935;color:white;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;animation:dangerPulse .35s ease infinite">!</div>';
      w.innerHTML=tags+`<svg width="70" height="55" viewBox="0 0 140 110"><ellipse cx="70" cy="105" rx="40" ry="5" fill="rgba(0,0,0,.06)"/><path d="M 24 55 Q 24 100 70 100 Q 116 100 116 55" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/><ellipse cx="70" cy="55" rx="46" ry="15" fill="#FEFEFE"/><ellipse cx="58" cy="52" rx="16" ry="6" fill="rgba(255,255,255,.5)"/>${applied}${done?'<text x="70" y="72" text-anchor="middle" font-size="22">✓</text>':''}${bowl.wrong?'<text x="70" y="72" text-anchor="middle" font-size="22">✗</text>':''}</svg>`+danger;
      el.appendChild(w);
    });
  }
}
function updateTimerHUD(){
  const el=$('hud-timer');if(!el)return;
  const c=G.timeLeft<=5?'#E53935':G.timeLeft<=10?'#FF9800':'#4CAF50';
  el.style.color=c;el.textContent=G.timeLeft+'s';
  if(G.timeLeft<=5)el.style.animation='heartBeat .5s ease infinite';
  const bar=$('timer-bar');if(bar){bar.style.width=(G.timeLeft/LEVEL_TIME*100)+'%';bar.style.backgroundColor=c}
}
function updateScoreHUD(){const el=$('hud-score');if(el){const cfg=lvCfg(G.level);el.textContent=`🍚 ${G.score}/${cfg.required}`}}
function updateMissDots(){const el=$('miss-dots');if(!el)return;el.innerHTML='';for(let i=0;i<MAX_MISSES;i++){el.innerHTML+=`<div style="width:14px;height:14px;border-radius:50%;background:${i<G.missed?'#E53935':'rgba(255,255,255,.08)'};border:2px solid ${i<G.missed?'#B71C1C':'rgba(255,255,255,.12)'};font-size:8px;color:white;font-weight:900;display:flex;align-items:center;justify-content:center">${i<G.missed?'✕':''}</div>`}}
function updateMsg(){const el=$('msg-bubble');if(el)el.textContent=G.msg}
function updateShima(){const el=$('shima-wrap');if(el)el.innerHTML=shimaSVG(G.shimaExpr,52)}
function updateSelectedDisplay(){
  const el=$('selected-display');if(!el)return;
  if(G.selected.length>0){el.style.color='#FFE0B2';el.innerHTML='手持ち: '+G.selected.map(s=>`<span style="color:${s.color};margin-right:3px">${s.emoji}</span>`).join('')+' → ご飯をタップ！'}
  else{el.style.color='rgba(255,255,255,.25)';el.textContent='↓ ふりかけを選んでね ↓'}
}
function updateFuriGrid(){
  const btns=document.querySelectorAll('#furi-grid .furikake-btn');
  btns.forEach(btn=>{
    const id=btn.getAttribute('data-id'),f=FURIKAKE.find(x=>x.id===id),sel=G.selected.some(s=>s.id===id);
    btn.style.background=sel?`linear-gradient(135deg,${f.color}55,${f.accent}55)`:`linear-gradient(135deg,${f.color},${f.accent})`;
    btn.style.border=sel?`3px solid ${f.color}`:'2px solid rgba(255,255,255,.08)';
    btn.style.opacity=sel?.5:1;btn.style.transform=sel?'scale(.94)':'scale(1)';
    btn.querySelector('.check')?.remove();
    if(sel){const ck=document.createElement('div');ck.className='check';ck.textContent='✓';btn.appendChild(ck)}
  });
}

function renderCleared(){
  const d=h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:'20px',gap:'14px'}});
  d.innerHTML=`
    <div style="font-size:48px;animation:starSpin 1s ease">⭐</div>
    ${shimaSVG('happy',100)}
    <div style="background:rgba(255,255,255,.06);border-radius:22px;padding:22px 28px;text-align:center;border:1px solid rgba(76,175,80,.2);max-width:340px;width:100%">
      <p style="font-size:14px;color:#A5D6A7;margin:0 0 4px;font-weight:700;letter-spacing:.1em">LEVEL ${G.level} CLEAR!</p>
      <p style="margin:8px 0 0;font-size:15px;color:#FFE0B2;font-weight:600;line-height:1.6">やったね！次も頑張ろう！✨</p>
    </div>`;
  if(G.level<MAX_LEVEL){const nb=h('button',{class:'btn-main',style:{animation:'pulse 2s ease infinite'},onClick:()=>startLevel(G.level+1)},'次のレベルへ！');d.appendChild(nb)}
  d.appendChild(h('button',{class:'btn-sub',onClick:()=>showScreen('levelSelect')},'レベル選択へ'));
  app.appendChild(d);
}

function renderFailed(){
  const cfg=lvCfg(G.level);
  const d=h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:'20px',gap:'14px'}});
  d.innerHTML=`
    ${shimaSVG('sad',100)}
    <div style="background:rgba(255,255,255,.06);border-radius:22px;padding:22px 28px;text-align:center;border:1px solid rgba(229,57,53,.2);max-width:340px;width:100%">
      <p style="font-size:14px;color:#EF9A9A;margin:0 0 4px;font-weight:700;letter-spacing:.1em">LEVEL ${G.level} FAILED</p>
      <p style="margin:8px 0 0;font-size:14px;color:#FFE0B2;font-weight:600">${G.missed>=MAX_MISSES?`ミス${MAX_MISSES}回…💦`:'時間切れ…⏱️'}</p>
      <p style="margin:4px 0 0;font-size:13px;color:#BCAAA4">完成: ${G.score}/${cfg.required}</p>
    </div>`;
  d.appendChild(h('button',{class:'btn-main',style:{animation:'pulse 2s ease infinite'},onClick:()=>startLevel(G.level)},'もういちど！'));
  d.appendChild(h('button',{class:'btn-sub',onClick:()=>showScreen('levelSelect')},'レベル選択へ'));
  app.appendChild(d);
}

function renderAllClear(){
  const d=h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:'20px',gap:'10px',position:'relative',overflow:'hidden'}});
  // Confetti
  let confetti='';const colors=["#FFD54F","#FF8F00","#E53935","#4CAF50","#2196F3","#E040FB","#FF6F00","#00BCD4"];
  for(let i=0;i<40;i++){const sz=6+Math.random()*8;confetti+=`<div style="position:absolute;left:${Math.random()*100}%;top:-20px;width:${sz}px;height:${sz*(0.6+Math.random()*.8)}px;background:${colors[i%8]};border-radius:${Math.random()>.5?'50%':'2px'};animation:confettiFall ${2.5+Math.random()*2}s linear ${Math.random()*2}s infinite;opacity:.8;z-index:0"></div>`}
  d.innerHTML=confetti+`
    <div style="position:absolute;top:10%;left:50%;width:500px;height:500px;background:radial-gradient(circle,rgba(255,213,79,.25),rgba(255,152,0,.1) 40%,transparent 70%);transform:translateX(-50%);pointer-events:none"></div>
    <div style="font-size:56px;animation:starSpin 2s ease infinite;z-index:1">🏆</div>
    <div style="font-family:'Zen Maru Gothic',sans-serif;font-size:40px;font-weight:900;background:linear-gradient(135deg,#FFD54F,#FF8F00,#E65100);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:omedetouPop .8s ease both,glowPulse 2s ease-in-out infinite;z-index:1;letter-spacing:.05em;filter:drop-shadow(0 2px 8px rgba(255,152,0,.4))">おめでとう！</div>
    <div style="animation:shimaDance 1.2s ease-in-out infinite;z-index:1">${shimaSVG('happy',140)}</div>
    <div style="background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border-radius:18px;padding:14px 24px;text-align:center;border:1px solid rgba(255,213,79,.2);max-width:320px;width:100%;z-index:1;animation:popIn .5s ease .5s both">
      <p style="font-size:15px;font-weight:700;color:#FFE0B2;margin:0;line-height:1.8">🎊 全20レベルクリア！🎊<br>キミは伝説のふりかけ職人だ！<br>シマエナガも大喜び！🐦✨</p>
    </div>
    <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;max-width:300px;z-index:1;animation:popIn .5s ease .8s both">${FURIKAKE.map((f,i)=>`<span style="font-size:24px;animation:popIn .3s ease ${1+i*.1}s both">${f.emoji}</span>`).join('')}</div>`;
  const btn=h('button',{class:'btn-main',style:{zIndex:1,animation:'popIn .5s ease 1.5s both'},onClick:()=>showScreen('levelSelect')},'レベル選択へ');
  d.appendChild(btn);
  app.appendChild(d);
}

// Start
showScreen('title');
</script>
</body>
</html>
